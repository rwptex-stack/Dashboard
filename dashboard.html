<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ron's Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #c9a84c;
    --accent2: #e8c97a;
    --text: #f0ede8;
    --text-muted: #888;
    --danger: #c0392b;
    --success: #27ae60;
    --urgent: #e74c3c;
    --important: #e67e22;
    --low: #7f8c8d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 32px 24px; }
  header { text-align: center; margin-bottom: 40px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: var(--accent); letter-spacing: 0.04em; }
  header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  #auth-bar { max-width: 560px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 0.85rem; }
  #auth-status-text { color: var(--text-muted); }
  #auth-status-text.signed-in { color: var(--success); }
  #sign-in-btn, #sign-out-btn { border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.85rem; padding: 7px 16px; cursor: pointer; transition: background 0.2s; }
  #sign-in-btn { background: var(--accent); color: #0f0f0f; }
  #sign-in-btn:hover { background: var(--accent2); }
  #sign-out-btn { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  #sign-out-btn:hover { color: var(--danger); border-color: var(--danger); }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 560px; margin: 0 auto 24px; }
  .btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; padding: 18px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 8px; letter-spacing: 0.03em; }
  .btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
  .btn .icon { font-size: 1.5rem; }
  .btn.wide { grid-column: span 2; }

  /* Info cards row */
  .info-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 560px; margin: 0 auto 24px; }
  .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .info-card-label { color: var(--accent); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .spanish-word { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--accent2); margin-bottom: 4px; }
  .spanish-pos { font-size: 0.78rem; color: var(--text-muted); font-style: italic; margin-bottom: 8px; }
  .spanish-meaning { font-size: 0.85rem; color: var(--text); line-height: 1.5; margin-bottom: 10px; }
  .spanish-example { font-size: 0.78rem; color: #666; font-style: italic; }
  .spanish-example-en { font-size: 0.75rem; color: #555; margin-top: 2px; }
  .history-item { margin-bottom: 12px; }
  .history-item:last-child { margin-bottom: 0; }
  .history-year { font-size: 0.72rem; color: var(--accent); margin-bottom: 3px; }
  .history-text { font-size: 0.83rem; color: var(--text); line-height: 1.4; }
  .history-divider { border-top: 1px solid var(--border); padding-top: 12px; }
  .info-loading { color: var(--text-muted); font-size: 0.82rem; font-style: italic; }

  .output-box { max-width: 560px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-height: 100px; display: none; }
  .output-box.visible { display: block; }
  .output-box h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .loading { color: var(--text-muted); font-size: 0.9rem; display: flex; align-items: center; gap: 10px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .event-item { padding: 12px 0; border-bottom: 1px solid var(--border); display: flex; gap: 14px; align-items: flex-start; }
  .event-item:last-child { border-bottom: none; }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
  .event-dot.spouse { background: #7eb8d4; }
  .event-title { font-weight: 500; font-size: 0.95rem; }
  .event-time { color: var(--text-muted); font-size: 0.8rem; margin-top: 2px; }
  .event-owner { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; font-style: italic; }
  .legend { display: flex; gap: 16px; margin-bottom: 16px; font-size: 0.8rem; color: var(--text-muted); align-items: center; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .priority-section { margin-bottom: 24px; }
  .priority-header { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; padding: 6px 10px; border-radius: 4px; margin-bottom: 8px; display: inline-block; }
  .priority-header.urgent { background: rgba(231,76,60,0.15); color: var(--urgent); }
  .priority-header.important { background: rgba(230,126,34,0.15); color: var(--important); }
  .priority-header.low { background: rgba(127,140,141,0.15); color: var(--low); }
  .email-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .email-item:last-child { border-bottom: none; }
  .email-from { font-weight: 500; font-size: 0.9rem; }
  .email-subject { font-size: 0.85rem; color: var(--text-muted); margin-top: 3px; }
  .email-summary { font-size: 0.82rem; color: var(--accent2); margin-top: 4px; font-style: italic; }
  .email-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .email-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .email-btn { font-size: 0.75rem; padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .email-btn:hover { border-color: var(--accent); color: var(--accent); }
  .email-btn.del:hover { border-color: var(--danger); color: var(--danger); }
  .email-btn.reply-btn:hover { border-color: var(--success); color: var(--success); }
  .email-body { margin-top: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 14px; font-size: 0.82rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; display: none; }
  .email-body.visible { display: block; }
  .reply-form { margin-top: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 14px; display: none; }
  .reply-form.visible { display: block; }
  .reply-form textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 10px; outline: none; resize: vertical; min-height: 100px; margin-bottom: 10px; transition: border-color 0.2s; }
  .reply-form textarea:focus { border-color: var(--accent); }
  .reply-form textarea::placeholder { color: var(--text-muted); }
  .reply-to { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 8px; }
  .send-reply-btn { background: var(--accent); color: #0f0f0f; border: none; border-radius: 5px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.82rem; padding: 8px 16px; cursor: pointer; transition: background 0.2s; }
  .send-reply-btn:hover { background: var(--accent2); }
  .reply-status { font-size: 0.78rem; margin-top: 6px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 10px 12px; outline: none; transition: border-color 0.2s; resize: vertical; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }
  .submit-btn { width: 100%; background: var(--accent); color: #0f0f0f; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; padding: 12px; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
  .submit-btn:hover { background: var(--accent2); }
  .no-events { color: var(--text-muted); font-size: 0.9rem; font-style: italic; }
  .error-msg { color: #e74c3c; font-size: 0.85rem; }
  .success-msg { color: var(--success); font-size: 0.85rem; }
  .ai-note { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 14px; font-style: italic; }

  /* Today's Menu */
  .menu-card { max-width: 560px; margin: 0 auto 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .menu-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 6px; }
  .menu-title { color: var(--accent); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; }
  .menu-day { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent2); }
  .menu-subtitle { font-size: 0.78rem; color: var(--text-muted); font-style: italic; margin-left: 6px; }
  .meal-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .meal-row:last-of-type { border-bottom: none; }
  .meal-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); min-width: 78px; padding-top: 3px; flex-shrink: 0; }
  .meal-text { flex: 1; font-size: 0.88rem; line-height: 1.45; }
  .recipe-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; font-size: 0.72rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
  .recipe-btn:hover { border-color: var(--accent); color: var(--accent); }
  .week-btn { width: 100%; margin-top: 14px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 6px; padding: 9px; font-size: 0.85rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .week-btn:hover { border-color: var(--accent); color: var(--accent); }
  /* Recipe display */
  .recipe-meta { display: flex; gap: 18px; margin-bottom: 14px; font-size: 0.82rem; color: var(--text-muted); flex-wrap: wrap; }
  .recipe-meta strong { color: var(--text); font-weight: 500; }
  .recipe-section-title { font-size: 0.78rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin: 18px 0 8px; }
  .recipe-list { list-style: none; padding: 0; margin: 0; }
  .recipe-list li { font-size: 0.88rem; line-height: 1.6; padding: 3px 0; }
  .recipe-list.numbered { counter-reset: step; }
  .recipe-list.numbered li { padding-left: 32px; position: relative; padding-top: 6px; padding-bottom: 6px; }
  .recipe-list.numbered li::before { counter-increment: step; content: counter(step); position: absolute; left: 0; top: 6px; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 600; }
  .recipe-tip { background: var(--surface2); border-left: 3px solid var(--accent); padding: 9px 12px; margin: 6px 0; font-size: 0.84rem; line-height: 1.5; border-radius: 0 4px 4px 0; }
  /* Full week view */
  .week-grid { display: flex; flex-direction: column; gap: 12px; }
  .week-day { padding: 12px 14px; background: var(--surface2); border-radius: 8px; }
  .week-day-name { color: var(--accent2); font-family: 'Playfair Display', serif; font-size: 1.05rem; margin-bottom: 6px; }
  .week-day-subtitle { color: var(--text-muted); font-style: italic; font-size: 0.85rem; font-family: 'DM Sans', sans-serif; margin-left: 6px; }
  .week-meal { font-size: 0.85rem; line-height: 1.5; padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
  .week-meal-label { color: var(--text-muted); font-weight: 500; min-width: 78px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; padding-top: 4px; }
  .week-meal-text { flex: 1; min-width: 200px; }
  /* Menu v2 additions */
  .menu-week-tag { display: inline-block; margin-left: 10px; background: var(--accent); color: var(--bg); font-size: 0.62rem; padding: 2px 8px; border-radius: 10px; letter-spacing: 0.08em; font-weight: 600; vertical-align: 2px; }
  .menu-btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .menu-btn { flex: 1 1 100px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 6px; padding: 9px 6px; font-size: 0.82rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .menu-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-form { display: flex; flex-direction: column; gap: 12px; }
  .refresh-row { display: flex; flex-direction: column; gap: 6px; }
  .refresh-label { font-size: 0.78rem; color: var(--text-muted); }
  .refresh-select, .refresh-textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; }
  .refresh-textarea { resize: vertical; min-height: 60px; }
  .refresh-submit { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; cursor: pointer; font-weight: 500; align-self: flex-start; }
  .refresh-submit:hover { opacity: 0.9; }
  .week-section { margin-bottom: 22px; }
  .week-section-title { font-size: 0.95rem; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .week-current { font-weight: 400; font-style: italic; color: var(--text-muted); text-transform: none; letter-spacing: normal; margin-left: 6px; font-size: 0.8rem; }
  .shop-section { margin-bottom: 16px; }

  /* Weather */
  .weather-day { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .weather-day:last-child { border-bottom: none; }
  .weather-date { font-size: 0.85rem; font-weight: 500; }
  .weather-desc { font-size: 0.8rem; color: var(--text-muted); }
  .weather-temps { font-size: 0.85rem; text-align: right; }
  .weather-high { color: var(--accent2); font-weight: 500; }
  .weather-low { color: var(--text-muted); }
  .weather-icon { font-size: 1.4rem; margin: 0 12px; }
</style>
</head>
<body>
<header>
  <h1>Ron's Dashboard</h1>
  <p>Calendar &amp; Email at a glance</p>
</header>

<div id="auth-bar">
  <span id="auth-status-text">Not signed in</span>
  <button id="sign-in-btn" onclick="handleSignIn()">Sign in with Google</button>
  <button id="sign-out-btn" onclick="handleSignOut()" style="display:none">Sign out</button>
</div>

<div class="btn-grid">
  <button class="btn" onclick="getTodayCalendar()"><span class="icon">📅</span>Today's Calendar</button>
  <button class="btn" onclick="getWeekCalendar()"><span class="icon">🗓️</span>This Week</button>
  <button class="btn" onclick="checkEmails()"><span class="icon">📬</span>Check Emails</button>
  <button class="btn" onclick="showAddEvent()"><span class="icon">➕</span>Add Event</button>
  <button class="btn" onclick="getTodayWeather()"><span class="icon">🌤️</span>Today's Weather</button>
  <button class="btn" onclick="getThreeDayWeather()"><span class="icon">🌦️</span>3-Day Forecast</button>
  <button class="btn wide" onclick="showCreateEmail()"><span class="icon">✉️</span>Create Email</button>
</div>

<!-- Info cards: Spanish word + History -->
<div class="info-cards">
  <div class="info-card">
    <div class="info-card-label">🇪🇸 Spanish word of the day</div>
    <div id="spanish-content"><span class="info-loading">Loading...</span></div>
  </div>
  <div class="info-card">
    <div class="info-card-label">📜 This day in history</div>
    <div id="history-content"><span class="info-loading">Loading...</span></div>
  </div>
</div>

<!-- Today's Menu -->
<div class="menu-card" id="menu-card">
  <div class="menu-header">
    <div>
      <span class="menu-title">🍽️ Today's Menu</span>
      <span class="menu-week-tag" id="menu-week-tag"></span>
    </div>
    <div><span class="menu-day" id="menu-day-name"></span></div>
  </div>
  <div id="menu-meals"></div>
  <div class="menu-btn-row">
    <button class="menu-btn" onclick="showFullTwoWeeks()">📅 Full 2 weeks</button>
    <button class="menu-btn" onclick="showRefreshForm()">🔄 Refresh menu</button>
    <button class="menu-btn" onclick="showShoppingList()">🛒 Shopping list</button>
  </div>
</div>

<div class="output-box" id="output">
  <h2 id="output-title">Results</h2>
  <div id="output-content"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  const _k = atob('c2stYW50LWFwaTAzLVlocC1NS2w1UVp1ZXN2VDhteUhYdTktNk9pZGpNUTBEcjUyT3VYV2Nsek1saFdBNDFwdlBmMVRXSnNxWWppbnFncUJzQTZ0TmVfdUY5ZTlDUWpld1lnLWdkY08yd0FB');
  const GOOGLE_CLIENT_ID = '131656481327-d7o8c49e8bvvnksg73e418okoi3eaupq.apps.googleusercontent.com';
  const SPOUSE_CALENDAR = 'daptex48@gmail.com';
  const SPOUSE_LABEL = "Dorothy's";
  const MY_LABEL = "Mine";
  const SPOUSE_COLOR = '#7eb8d4';
  const MY_COLOR = 'var(--accent)';
  const SCOPES = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/gmail.modify https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.readonly';
  const TOKEN_KEY = 'dashboard_google_token';
  const TOKEN_EXPIRY_KEY = 'dashboard_token_expiry';
  const MODEL = 'claude-haiku-4-5-20251001';
  const WEATHER_LAT = 30.5418;
  const WEATHER_LON = -98.3629;

  let tokenClient, accessToken = null;

  function saveToken(t, e) { localStorage.setItem(TOKEN_KEY, t); localStorage.setItem(TOKEN_EXPIRY_KEY, (Date.now() + (e - 300) * 1000).toString()); }
  function loadToken() { const t = localStorage.getItem(TOKEN_KEY); const e = parseInt(localStorage.getItem(TOKEN_EXPIRY_KEY) || '0'); return (t && Date.now() < e) ? t : null; }
  function clearToken() { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(TOKEN_EXPIRY_KEY); }
  function setSignedIn(email) {
    document.getElementById('auth-status-text').textContent = '✓ Signed in' + (email ? ' as ' + email : '');
    document.getElementById('auth-status-text').className = 'signed-in';
    document.getElementById('sign-in-btn').style.display = 'none';
    document.getElementById('sign-out-btn').style.display = 'inline-block';
  }
  function setSignedOut() {
    document.getElementById('auth-status-text').textContent = 'Not signed in';
    document.getElementById('auth-status-text').className = '';
    document.getElementById('sign-in-btn').style.display = 'inline-block';
    document.getElementById('sign-out-btn').style.display = 'none';
    accessToken = null; clearToken();
  }
  function handleSignOut() { setSignedOut(); document.getElementById('output').classList.remove('visible'); }
  function initGoogle() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID, scope: SCOPES,
      callback: (resp) => {
        if (resp.error) return;
        accessToken = resp.access_token;
        saveToken(accessToken, resp.expires_in || 3600);
        setSignedIn('');
        fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${accessToken}` } })
          .then(r => r.json()).then(info => { if (info.email) setSignedIn(info.email); }).catch(() => {});
      }
    });
    const saved = loadToken();
    if (saved) {
      accessToken = saved; setSignedIn('');
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${accessToken}` } })
        .then(r => r.json()).then(info => { if (info.email) setSignedIn(info.email); else setSignedOut(); })
        .catch(() => setSignedOut());
    }
  }
  function handleSignIn() { tokenClient.requestAccessToken({ prompt: '' }); }
  function requireAuth() { if (!accessToken) { showOutput('Sign In Required', '<p class="error-msg">Please sign in with Google first.</p>'); return false; } return true; }
  function showOutput(title, html) { document.getElementById('output-title').textContent = title; document.getElementById('output-content').innerHTML = html; document.getElementById('output').classList.add('visible'); document.getElementById('output').scrollIntoView({ behavior: 'smooth' }); }
  function loading(title, msg) { showOutput(title, `<div class="loading"><div class="spinner"></div>${msg || 'Loading...'}</div>`); }
  function formatTime(dt) { return dt ? new Date(dt).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) : 'All day'; }
  function formatDate(dt) { return dt ? new Date(dt).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) : ''; }

  // --- AI Helper ---
  async function callAI(prompt, maxTokens = 500) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': _k, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: MODEL, max_tokens: maxTokens, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      const msg = (data.error && data.error.message) || ('HTTP ' + res.status);
      const type = (data.error && data.error.type) || '';
      throw new Error('API ' + res.status + ' (' + type + '): ' + msg);
    }
    return data.content?.[0]?.text || '';
  }

  function loadSpanishWord() {
    const el = document.getElementById('spanish-content');
    const cacheKey = 'spanish_' + getDayKey();
    Object.keys(localStorage).forEach(k => { if (k.startsWith('spanish_') && k !== cacheKey) localStorage.removeItem(k); });
    const cached = localStorage.getItem(cacheKey);
    if (cached) { el.innerHTML = cached; return; }
    // Pick by day-of-year — different word each day, no API needed
    const now = new Date();
    const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
    const data = SPANISH_TOURISM_WORDS[dayOfYear % SPANISH_TOURISM_WORDS.length];
    const html = `
      <div class="spanish-word">${data.word}</div>
      <div class="spanish-pos">${data.partOfSpeech} · ${data.englishMeaning}</div>
      <div class="spanish-meaning">${data.description}</div>
      <div class="spanish-example">"${data.exampleSpanish}"</div>
      <div class="spanish-example-en">"${data.exampleEnglish}"</div>
    `;
    el.innerHTML = html;
    localStorage.setItem(cacheKey, html);
  }

  // --- This Day in History (Wikipedia free API — no cost) ---
  async function loadHistory() {
    const el = document.getElementById('history-content');
    const cacheKey = 'history_' + getDayKey();
    Object.keys(localStorage).forEach(k => { if (k.startsWith('history_') && k !== cacheKey) localStorage.removeItem(k); });
    const cached = localStorage.getItem(cacheKey);
    if (cached) { el.innerHTML = cached; return; }
    try {
      const now = new Date();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const res = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${mm}/${dd}`);
      if (!res.ok) throw new Error('Wikipedia API error');
      const data = await res.json();
      const events = data.events || [];
      if (!events.length) throw new Error('No events returned');
      // Pick 2 random events and sort by year for display
      const picked = events.sort(() => Math.random() - 0.5).slice(0, 2).sort((a, b) => a.year - b.year);
      const html = picked.map((e, i) => `
        <div class="${i > 0 ? 'history-item history-divider' : 'history-item'}">
          <div class="history-year">${e.year}</div>
          <div class="history-text">${e.text}</div>
        </div>
      `).join('');
      el.innerHTML = html;
      localStorage.setItem(cacheKey, html);
    } catch (e) {
      el.innerHTML = '<span class="info-loading">Could not load history.</span>';
    }
  }

    // --- Weather ---
  function weatherIcon(code) {
    if (code <= 1) return '☀️';
    if (code <= 3) return '⛅';
    if (code <= 48) return '🌫️';
    if (code <= 67) return '🌧️';
    if (code <= 77) return '❄️';
    if (code <= 82) return '🌦️';
    if (code <= 99) return '⛈️';
    return '🌡️';
  }
  function weatherDesc(code) {
    if (code === 0) return 'Clear sky';
    if (code === 1) return 'Mainly clear';
    if (code === 2) return 'Partly cloudy';
    if (code === 3) return 'Overcast';
    if (code <= 48) return 'Foggy';
    if (code <= 55) return 'Drizzle';
    if (code <= 67) return 'Rain';
    if (code <= 77) return 'Snow';
    if (code <= 82) return 'Rain showers';
    if (code <= 99) return 'Thunderstorm';
    return 'Unknown';
  }
  function cToF(c) { return Math.round(c * 9/5 + 32); }

  async function fetchWeather() {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&timezone=America%2FChicago&forecast_days=3`);
    return res.json();
  }

  // --- Email ---
  async function fetchEmailDetails(maxResults = 15) {
    const thirtyDaysAgo = Math.floor((Date.now() - 30 * 24 * 60 * 60 * 1000) / 1000);
    const res = await fetch(`https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=${maxResults}&labelIds=INBOX&labelIds=UNREAD&q=after:${thirtyDaysAgo}`, { headers: { Authorization: `Bearer ${accessToken}` } });
    const data = await res.json();
    if (!data.messages) return [];
    return Promise.all(data.messages.map(m =>
      fetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date&metadataHeaders=Reply-To`, { headers: { Authorization: `Bearer ${accessToken}` } }).then(r => r.json())
    ));
  }
  function parseEmailMeta(msg) {
    const headers = msg.payload?.headers || [];
    const from = headers.find(h => h.name === 'From')?.value || 'Unknown';
    const subject = headers.find(h => h.name === 'Subject')?.value || '(No subject)';
    const date = headers.find(h => h.name === 'Date')?.value || '';
    const replyTo = headers.find(h => h.name === 'Reply-To')?.value || from;
    const fromName = from.replace(/<.*>/, '').trim() || from;
    const replyEmail = (replyTo.match(/<(.+)>/) || [])[1] || replyTo;
    const d = date ? new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';
    return { id: msg.id, from: fromName, replyEmail, subject, date: d };
  }
  async function fetchEmailBody(msgId) {
    const res = await fetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${msgId}?format=full`, { headers: { Authorization: `Bearer ${accessToken}` } });
    const data = await res.json();
    function decode(d) { return decodeURIComponent(escape(atob(d.replace(/-/g, '+').replace(/_/g, '/')))); }
    function extractPart(payload, mimeType) {
      if (!payload) return null;
      if (payload.mimeType === mimeType && payload.body?.data) return decode(payload.body.data);
      if (payload.parts) { for (const part of payload.parts) { const r = extractPart(part, mimeType); if (r) return r; } }
      return null;
    }
    const plain = extractPart(data.payload, 'text/plain');
    if (plain) return { type: 'text', content: plain };
    const html = extractPart(data.payload, 'text/html');
    if (html) return { type: 'html', content: html };
    return { type: 'text', content: '(No readable content)' };
  }
  async function toggleRead(msgId, btn) {
    const bodyEl = document.getElementById('body-' + msgId);
    if (bodyEl.classList.contains('visible')) { bodyEl.classList.remove('visible'); btn.textContent = '📖 Read'; return; }
    btn.textContent = 'Loading...';
    try {
      const result = await fetchEmailBody(msgId);
      if (result.type === 'html') {
        bodyEl.innerHTML = '';
        const iframe = document.createElement('iframe');
        iframe.style.cssText = 'width:100%;border:none;min-height:300px;background:white;border-radius:4px;';
        iframe.sandbox = 'allow-same-origin';
        bodyEl.appendChild(iframe);
        bodyEl.classList.add('visible');
        iframe.contentDocument.open();
        iframe.contentDocument.write(result.content);
        iframe.contentDocument.close();
        setTimeout(() => { iframe.style.height = iframe.contentDocument.body.scrollHeight + 'px'; }, 300);
      } else {
        bodyEl.textContent = result.content;
        bodyEl.classList.add('visible');
      }
      btn.textContent = '📖 Hide';
    } catch (e) { bodyEl.textContent = 'Error loading email.'; bodyEl.classList.add('visible'); btn.textContent = '📖 Hide'; }
  }
  function toggleReply(msgId) {
    const replyEl = document.getElementById('reply-' + msgId);
    if (replyEl.classList.contains('visible')) { replyEl.classList.remove('visible'); return; }

  async function sendReply(msgId, replyEmail, subject, btn) {
    const textarea = document.getElementById('reply-' + msgId).querySelector('textarea');
    const body = textarea.value.trim();
    const statusEl = document.getElementById('reply-status-' + msgId);
    if (!body) { statusEl.innerHTML = '<span style="color:var(--danger)">Please type a reply.</span>'; return; }
    btn.textContent = 'Sending...';
    try {
      const replySubject = subject.startsWith('Re:') ? subject : 'Re: ' + subject;
      const emailContent = [`To: ${replyEmail}`, `Subject: ${replySubject}`, 'Content-Type: text/plain; charset=utf-8', 'MIME-Version: 1.0', '', body].join('\n');
      const encoded = btoa(unescape(encodeURIComponent(emailContent))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      const res = await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/send', { method: 'POST', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ raw: encoded }) });
      if (res.ok) { statusEl.innerHTML = '<span style="color:var(--success)">✓ Reply sent!</span>'; textarea.value = ''; setTimeout(() => { document.getElementById('reply-' + msgId).classList.remove('visible'); statusEl.innerHTML = ''; }, 2000); }
      else { const err = await res.json(); statusEl.innerHTML = `<span style="color:var(--danger)">Error: ${err.error?.message}</span>`; }
    } catch (e) { statusEl.innerHTML = `<span style="color:var(--danger)">Error: ${e.message}</span>`; }
    btn.textContent = 'Send Reply';
  }

  async function prioritizeWithAI(emails) {
    const emailList = emails.map((e, i) => `${i + 1}. From: ${e.from} | Subject: ${e.subject} | Date: ${e.date}`).join('\n');
    const text = await callAI(`You are a personal email assistant. Prioritize these UNREAD emails into three groups: URGENT, IMPORTANT, and LOW. For each email provide a one-sentence summary. Respond ONLY with valid JSON: {"urgent":[{"index":1,"summary":"brief summary"}],"important":[{"index":2,"summary":"brief summary"}],"low":[{"index":3,"summary":"brief summary"}]}\nEmails:\n${emailList}`, 600);

  function emailActionsHTML(email) {

  function renderPrioritizedEmails(emails, prioritized) {
    const groups = [{ key: 'urgent', label: '🔴 Urgent', cls: 'urgent' }, { key: 'important', label: '🟠 Important', cls: 'important' }, { key: 'low', label: '⚪ Low Priority', cls: 'low' }];
    let html = '<p class="ai-note">✨ Unread emails — prioritized by AI</p>';
    for (const group of groups) {
      const items = prioritized[group.key] || [];
      if (!items.length) continue;
      html += `<div class="priority-section"><div class="priority-header ${group.cls}">${group.label}</div>`;

        (isCurrent ? ' <span class="week-current">(this week)</span>' : '') +
        '</div><div class="week-grid">' + order.map(idx => {
          const d = days[idx];
          const mealRow = (lbl, type) => `
            <div class="week-meal">
              <span class="week-meal-label">${lbl}</span>
              <span class="week-meal-text">${d[type]}</span>
              <button class="recipe-btn" onclick="getRecipe('${label}', ${idx}, '${type}')">Recipe</button>
            </div>`;
          return `
            <div class="week-day">
              <div class="week-day-name">${DAY_NAMES[idx]}</div>
              ${mealRow('Breakfast', 'breakfast')}
              ${mealRow('Lunch', 'lunch')}
              ${mealRow('Dinner', 'dinner')}
            </div>`;
        }).join('') + '</div></div>';
    }
    showOutput('Two-Week Menu', renderWeek('A', menus.weekA) + renderWeek('B', menus.weekB));
  }

  async function getRecipe(week, dayIdx, mealType) {
    const menus = loadMenus();
    const meal = (week === 'A' ? menus.weekA : menus.weekB)[dayIdx][mealType];
    const dayName = DAY_NAMES[dayIdx];
    const mealLabel = mealType.charAt(0).toUpperCase() + mealType.slice(1);
    // Cache recipes — never call the API for the same meal twice
    const recipeCacheKey = 'recipe_' + week + '_' + dayIdx + '_' + mealType;
    const cachedHtml = localStorage.getItem(recipeCacheKey);
    if (cachedHtml) { showOutput(meal + ' — for 2', cachedHtml); return; }

    loading(`Recipe — ${dayName} ${mealLabel}`, 'Asking Claude for the recipe...');
    try {
      const text = await callAI(`Recipe for 2 in Texas: "${meal}". Common grocery ingredients only. Pick first option if multiple. JSON only:
{"name":"Name","servings":2,"prepTime":"10 min","cookTime":"25 min","ingredients":["1 lb chicken","..."],"instructions":["Step 1","..."],"tips":["Tip"]}`, 800);
      const data = JSON.parse(text.replace(/```json|```/g, '').trim());
      const html = `
        <div class="recipe-meta">
          <span><strong>Serves</strong> ${data.servings}</span>
          ${data.prepTime ? `<span><strong>Prep</strong> ${data.prepTime}</span>` : ''}
          ${data.cookTime ? `<span><strong>Cook</strong> ${data.cookTime}</span>` : ''}
        </div>
        <div class="recipe-section-title">Ingredients</div>
        <ul class="recipe-list">${data.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
        <div class="recipe-section-title">Instructions</div>
        <ol class="recipe-list numbered">${data.instructions.map(i => `<li>${i}</li>`).join('')}</ol>
        ${data.tips && data.tips.length ? `<div class="recipe-section-title">Tips</div>${data.tips.map(t => `<div class="recipe-tip">${t}</div>`).join('')}` : ''}
      `;
      localStorage.setItem(recipeCacheKey, html);
      showOutput(`${data.name} — for 2`, html);
    } catch (e) {
      showOutput(`Recipe — ${dayName} ${mealLabel}`, `<p class="error-msg">Sorry, could not generate the recipe: ${e.message}</p>`);
    }
  }

  function showRefreshForm() {
    const current = getCurrentWeekLabel();
    const other = current === 'A' ? 'B' : 'A';
    const html = `
      <div class="refresh-form">
        <p class="ai-note">Generate a fresh menu, then save it on this computer so it sticks around between visits.</p>
        <div class="refresh-row">
          <label class="refresh-label" for="refresh-scope">Refresh which week?</label>
          <select class="refresh-select" id="refresh-scope">
            <option value="${current}">This week (Week ${current})</option>
            <option value="${other}">Other week (Week ${other})</option>
            <option value="both">Both weeks</option>
          </select>
        </div>
        <div class="refresh-row">
          <label class="refresh-label" for="refresh-comment">Anything special? (optional)</label>
          <textarea class="refresh-textarea" id="refresh-comment" rows="3" placeholder="e.g. lighter meals this week, company on Saturday, my stomach has been off, more pasta, no fish this round, etc."></textarea>
        </div>
        <button class="refresh-submit" onclick="runRefresh()">Generate new menu</button>
        <p class="ai-note" style="margin-top: 8px;">Your menus are saved on this computer only. If you clear your browser data, the default menu comes back — nothing important is lost.</p>
      </div>
    `;
    showOutput('Refresh Menu', html);
  }

  async function runRefresh() {
    const scope = document.getElementById('refresh-scope').value;
    const comment = document.getElementById('refresh-comment').value.trim();
    loading('Generating menu', 'Asking Claude to come up with fresh meal ideas...');
    const whichWeeks = scope === 'both'
      ? 'BOTH Week A AND Week B (a full 14-day rotation, with different meals in each week)'
      : `one week of meals (7 days, Sunday through Saturday)`;
    const extra = comment ? `\n\nSpecial request from the user for this refresh: "${comment}". Honor it as best you can while staying within the rules above.` : '';
    const shape = scope === 'both'
      ? '{"weekA":[7 day objects from Sunday to Saturday],"weekB":[7 day objects from Sunday to Saturday]}'
      : '{"week":[7 day objects from Sunday to Saturday]}';
    const prompt = `Generate a meal plan. ${MENU_PREFS}

Generate ${whichWeeks}. Each day is an object with three string fields: breakfast, lunch, dinner. Be concrete and varied. Make sure the two weeks differ in their dinners if generating both.${extra}

Respond ONLY with valid JSON, no other text, in this exact shape:
${shape}`;
    try {
      const text = await callAI(prompt, 1800);
      const data = JSON.parse(text.replace(/```json|```/g, '').trim());
      const menus = loadMenus();
      if (scope === 'both') {
        if (!Array.isArray(data.weekA) || data.weekA.length !== 7 || !Array.isArray(data.weekB) || data.weekB.length !== 7) throw new Error('Unexpected response shape');
        menus.weekA = data.weekA;
        menus.weekB = data.weekB;
      } else {
        if (!Array.isArray(data.week) || data.week.length !== 7) throw new Error('Unexpected response shape');
        if (scope === 'A') menus.weekA = data.week;
        else menus.weekB = data.week;
      }
      saveMenus(menus);
      renderTodayMenu();
      showOutput('Menu Refreshed', '<p class="success-msg">✓ New menu saved on this computer. Today\'s menu has been updated on your dashboard.</p><p style="margin-top:12px;">Click <strong>📅 Full 2 weeks</strong> on the menu card to see all the new meals.</p>');
    } catch (e) {
      showOutput('Refresh Failed', `<p class="error-msg">Sorry, could not generate a new menu: ${e.message}. You can try again — your current menu is unchanged.</p>`);
    }
  }

  async function showShoppingList() {
    const shopCacheKey = 'shoplist_' + getCurrentWeekLabel() + '_' + JSON.stringify(loadMenus()).length;
    const shopCached = localStorage.getItem(shopCacheKey);
    if (shopCached) { showOutput('Shopping List (cached)', shopCached); return; }
    const menus = loadMenus();
    const week = getCurrentWeekLabel();
    const days = week === 'A' ? menus.weekA : menus.weekB;
    const mealsList = days.map((d, i) => `${DAY_NAMES[i]} -- B: ${d.breakfast} | L: ${d.lunch} | D: ${d.dinner}`).join('\n');
    loading(`Shopping List — Week ${week}`, 'Building the list...');
    try {
      const text = await callAI(`Read this week of meals (Sunday through Saturday, for two people) and build a consolidated grocery shopping list. Group items by section: Produce, Meat & Seafood, Dairy & Eggs, Pantry & Bread, Freezer. Combine quantities where the same ingredient appears more than once. Skip pantry staples that are usually on hand (salt, pepper, olive oil, basic dried herbs) unless a recipe needs an unusual amount. Use common Texas grocery store items. Include rough quantities (e.g. "2 lbs chicken thighs", "1 dozen eggs").

Meals:
${mealsList}

Respond ONLY with valid JSON, no other text, in this exact shape:
{"sections":[{"name":"Produce","items":["Item with quantity","..."]},{"name":"Meat & Seafood","items":["..."]},{"name":"Dairy & Eggs","items":["..."]},{"name":"Pantry & Bread","items":["..."]},{"name":"Freezer","items":["..."]}]}`, 1200);
      const data = JSON.parse(text.replace(/```json|```/g, '').trim());
      const html = data.sections.filter(s => s.items && s.items.length).map(s => `
        <div class="shop-section">
          <div class="recipe-section-title">${s.name}</div>
          <ul class="recipe-list">${s.items.map(i => `<li>${i}</li>`).join('')}</ul>
        </div>`).join('');
      localStorage.setItem(shopCacheKey, html);
      showOutput(`Shopping List — Week ${week}`, html);
    } catch (e) {
      showOutput(`Shopping List — Week ${week}`, `<p class="error-msg">Sorry, could not generate the list: ${e.message}</p>`);
    }
  }

  window.onload = () => {
    const gsiScript = document.querySelector('script[src*="gsi"]');
    if (typeof google !== 'undefined') initGoogle();
    else gsiScript.addEventListener('load', initGoogle);
    loadSpanishWord();
    loadHistory();
    renderTodayMenu();
  };
</script>
</body>
</html>
