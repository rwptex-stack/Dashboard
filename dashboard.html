<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #c9a84c;
    --accent2: #e8c97a;
    --text: #f0ede8;
    --text-muted: #888;
    --danger: #c0392b;
    --success: #27ae60;
    --urgent: #e74c3c;
    --important: #e67e22;
    --low: #7f8c8d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 24px;
  }
  header { text-align: center; margin-bottom: 40px; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    color: var(--accent);
    letter-spacing: 0.04em;
  }
  header p {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #auth-bar {
    max-width: 560px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 0.85rem;
  }
  #auth-status-text { color: var(--text-muted); }
  #auth-status-text.signed-in { color: var(--success); }
  #sign-in-btn, #sign-out-btn {
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #sign-in-btn { background: var(--accent); color: #0f0f0f; }
  #sign-in-btn:hover { background: var(--accent2); }
  #sign-out-btn { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  #sign-out-btn:hover { color: var(--danger); border-color: var(--danger); }
  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    max-width: 560px;
    margin: 0 auto 32px;
  }
  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 18px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.03em;
  }
  .btn:hover {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }
  .btn .icon { font-size: 1.5rem; }
  .btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .btn.wide { grid-column: span 2; }
  .output-box {
    max-width: 560px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    min-height: 100px;
    display: none;
  }
  .output-box.visible { display: block; }
  .output-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--accent);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .loading {
    color: var(--text-muted);
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .event-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .event-item:last-child { border-bottom: none; }
  .event-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 6px;
    flex-shrink: 0;
  }
  .event-dot.wife { background: #7eb8d4; }
  .event-title { font-weight: 500; font-size: 0.95rem; }
  .event-time { color: var(--text-muted); font-size: 0.8rem; margin-top: 2px; }
  .event-owner { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; font-style: italic; }
  .legend {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    font-size: 0.8rem;
    color: var(--text-muted);
    align-items: center;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .priority-section { margin-bottom: 24px; }
  .priority-header {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 6px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
    display: inline-block;
  }
  .priority-header.urgent { background: rgba(231,76,60,0.15); color: var(--urgent); }
  .priority-header.important { background: rgba(230,126,34,0.15); color: var(--important); }
  .priority-header.low { background: rgba(127,140,141,0.15); color: var(--low); }
  .email-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .email-item:last-child { border-bottom: none; }
  .email-from { font-weight: 500; font-size: 0.9rem; }
  .email-subject { font-size: 0.85rem; color: var(--text-muted); margin-top: 3px; }
  .email-summary { font-size: 0.82rem; color: var(--accent2); margin-top: 4px; font-style: italic; }
  .email-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .email-actions { display: flex; gap: 8px; margin-top: 8px; }
  .email-btn {
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .email-btn:hover { border-color: var(--accent); color: var(--accent); }
  .email-btn.del:hover { border-color: var(--danger); color: var(--danger); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }
  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 12px;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }
  .submit-btn:hover { background: var(--accent2); }
  .no-events { color: var(--text-muted); font-size: 0.9rem; font-style: italic; }
  .error-msg { color: #e74c3c; font-size: 0.85rem; }
  .success-msg { color: var(--success); font-size: 0.85rem; }
  .ai-note { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 14px; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>My Dashboard</h1>
  <p>Calendar &amp; Email at a glance</p>
</header>

<div id="auth-bar">
  <span id="auth-status-text">Not signed in</span>
  <button id="sign-in-btn" onclick="handleSignIn()">Sign in with Google</button>
  <button id="sign-out-btn" onclick="handleSignOut()" style="display:none">Sign out</button>
</div>

<div class="btn-grid">
  <button class="btn" onclick="getTodayCalendar()">
    <span class="icon">📅</span>Today's Calendar
  </button>
  <button class="btn" onclick="getWeekCalendar()">
    <span class="icon">🗓️</span>This Week
  </button>
  <button class="btn" onclick="checkEmails()">
    <span class="icon">📬</span>Check Emails
  </button>
  <button class="btn" onclick="showAddEvent()">
    <span class="icon">➕</span>Add Event
  </button>
  <button class="btn" onclick="showCreateEmail()">
    <span class="icon">✉️</span>Create Email
  </button>
  <button class="btn danger" onclick="deleteEmailsView()">
    <span class="icon">🗑️</span>Delete Emails
  </button>
</div>

<div class="output-box" id="output">
  <h2 id="output-title">Results</h2>
  <div id="output-content"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  const _k = atob('c2stYW50LWFwaTAzLVlocC1NS2w1UVp1ZXN2VDhteUhYdTktNk9pZGpNUTBEcjUyT3VYV2Nsek1saFdBNDFwdlBmMVRXSnNxWWppbnFncUJzQTZ0TmVfdUY5ZTlDUWpld1lnLWdkY08yd0FB');
  const GOOGLE_CLIENT_ID = '131656481327-d7o8c49e8bvvnksg73e418okoi3eaupq.apps.googleusercontent.com';
  const WIFE_CALENDAR = 'daptex48@gmail.com';
  const SCOPES = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/gmail.modify https://www.googleapis.com/auth/gmail.send';
  const TOKEN_KEY = 'dashboard_google_token';
  const TOKEN_EXPIRY_KEY = 'dashboard_token_expiry';

  let tokenClient;
  let accessToken = null;

  function saveToken(token, expiresIn) {
    const expiry = Date.now() + (expiresIn - 300) * 1000;
    localStorage.setItem(TOKEN_KEY, token);
    localStorage.setItem(TOKEN_EXPIRY_KEY, expiry.toString());
  }

  function loadToken() {
    const token = localStorage.getItem(TOKEN_KEY);
    const expiry = parseInt(localStorage.getItem(TOKEN_EXPIRY_KEY) || '0');
    if (token && Date.now() < expiry) return token;
    return null;
  }

  function clearToken() {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(TOKEN_EXPIRY_KEY);
  }

  function setSignedIn(email) {
    document.getElementById('auth-status-text').textContent = '✓ Signed in' + (email ? ' as ' + email : '');
    document.getElementById('auth-status-text').className = 'signed-in';
    document.getElementById('sign-in-btn').style.display = 'none';
    document.getElementById('sign-out-btn').style.display = 'inline-block';
  }

  function setSignedOut() {
    document.getElementById('auth-status-text').textContent = 'Not signed in';
    document.getElementById('auth-status-text').className = '';
    document.getElementById('sign-in-btn').style.display = 'inline-block';
    document.getElementById('sign-out-btn').style.display = 'none';
    accessToken = null;
    clearToken();
  }

  function handleSignOut() {
    setSignedOut();
    document.getElementById('output').classList.remove('visible');
  }

  function initGoogle() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) { console.error(resp.error); return; }
        accessToken = resp.access_token;
        saveToken(accessToken, resp.expires_in || 3600);
        setSignedIn('');
        fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: `Bearer ${accessToken}` }
        }).then(r => r.json()).then(info => {
          if (info.email) setSignedIn(info.email);
        }).catch(() => {});
      }
    });

    const saved = loadToken();
    if (saved) {
      accessToken = saved;
      setSignedIn('');
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { Authorization: `Bearer ${accessToken}` }
      }).then(r => r.json()).then(info => {
        if (info.email) setSignedIn(info.email);
        else setSignedOut();
      }).catch(() => setSignedOut());
    }
  }

  function handleSignIn() {
    tokenClient.requestAccessToken({ prompt: '' });
  }

  function requireAuth() {
    if (!accessToken) {
      showOutput('Sign In Required', '<p class="error-msg">Please sign in with Google first.</p>');
      return false;
    }
    return true;
  }

  function showOutput(title, html) {
    document.getElementById('output-title').textContent = title;
    document.getElementById('output-content').innerHTML = html;
    document.getElementById('output').classList.add('visible');
    document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
  }

  function loading(title, msg) {
    showOutput(title, `<div class="loading"><div class="spinner"></div>${msg || 'Loading...'}</div>`);
  }

  function formatTime(dt) {
    if (!dt) return 'All day';
    return new Date(dt).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function formatDate(dt) {
    if (!dt) return '';
    return new Date(dt).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  async function fetchCalendarEvents(calendarId, timeMin, timeMax) {
    const params = new URLSearchParams({ timeMin, timeMax, singleEvents: true, orderBy: 'startTime', maxResults: 20 });
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?${params}`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    if (!res.ok) return [];
    return (await res.json()).items || [];
  }

  function renderEvents(myEvents, wifeEvents, showDate = false) {
    const all = [
      ...myEvents.map(e => ({ ...e, owner: 'mine' })),
      ...wifeEvents.map(e => ({ ...e, owner: 'wife' }))
    ].sort((a, b) => (a.start?.dateTime || a.start?.date || '').localeCompare(b.start?.dateTime || b.start?.date || ''));

    if (all.length === 0) return '<p class="no-events">No events found.</p>';

    const legend = `<div class="legend">
      <span><span class="legend-dot" style="background:var(--accent)"></span>Yours</span>
      <span><span class="legend-dot" style="background:#7eb8d4"></span>Wife's</span>
    </div>`;

    return legend + all.map(e => {
      const isWife = e.owner === 'wife';
      return `<div class="event-item">
        <div class="event-dot ${isWife ? 'wife' : ''}"></div>
        <div>
          <div class="event-title">${e.summary || '(No title)'}</div>
          <div class="event-time">${e.start?.dateTime ? formatTime(e.start.dateTime) : 'All day'}</div>
          ${showDate ? `<div class="event-time">${formatDate(e.start?.dateTime || e.start?.date)}</div>` : ''}
          ${isWife ? '<div class="event-owner">Wife\'s calendar</div>' : ''}
        </div>
      </div>`;
    }).join('');
  }

  async function getTodayCalendar() {
    if (!requireAuth()) return;
    loading("Today's Calendar");
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
    const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();
    try {
      const [mine, wife] = await Promise.all([
        fetchCalendarEvents('primary', start, end),
        fetchCalendarEvents(WIFE_CALENDAR, start, end)
      ]);
      showOutput("Today's Calendar", renderEvents(mine, wife, false));
    } catch (e) {
      showOutput("Today's Calendar", `<p class="error-msg">Error: ${e.message}</p>`);
    }
  }

  async function getWeekCalendar() {
    if (!requireAuth()) return;
    loading("This Week's Calendar");
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
    const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 7, 23, 59, 59).toISOString();
    try {
      const [mine, wife] = await Promise.all([
        fetchCalendarEvents('primary', start, end),
        fetchCalendarEvents(WIFE_CALENDAR, start, end)
      ]);
      showOutput("This Week's Calendar", renderEvents(mine, wife, true));
    } catch (e) {
      showOutput("This Week's Calendar", `<p class="error-msg">Error: ${e.message}</p>`);
    }
  }

  async function fetchEmailDetails(maxResults = 15) {
    const res = await fetch(`https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=${maxResults}&labelIds=INBOX`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await res.json();
    if (!data.messages) return [];
    return Promise.all(data.messages.map(m =>
      fetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      }).then(r => r.json())
    ));
  }

  function parseEmailMeta(msg) {
    const headers = msg.payload?.headers || [];
    const from = headers.find(h => h.name === 'From')?.value || 'Unknown';
    const subject = headers.find(h => h.name === 'Subject')?.value || '(No subject)';
    const date = headers.find(h => h.name === 'Date')?.value || '';
    const fromName = from.replace(/<.*>/, '').trim() || from;
    const d = date ? new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';
    return { id: msg.id, from: fromName, subject, date: d };
  }

  async function prioritizeWithAI(emails) {
    const emailList = emails.map((e, i) => `${i + 1}. From: ${e.from} | Subject: ${e.subject} | Date: ${e.date}`).join('\n');
    const prompt = `You are a personal email assistant. Prioritize these emails into three groups: URGENT (needs immediate attention), IMPORTANT (should read today), and LOW (newsletters, promotions, can wait or delete).

For each email provide a one-sentence summary of likely content based on sender and subject.

Respond ONLY with valid JSON in this exact format, no other text:
{"urgent":[{"index":1,"summary":"brief summary"}],"important":[{"index":2,"summary":"brief summary"}],"low":[{"index":3,"summary":"brief summary"}]}

Emails:
${emailList}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': _k,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '{}';
    try {
      return JSON.parse(text.replace(/```json|```/g, '').trim());
    } catch {
      return null;
    }
  }

  function renderPrioritizedEmails(emails, prioritized, showDelete = false) {
    const groups = [
      { key: 'urgent', label: '🔴 Urgent', cls: 'urgent' },
      { key: 'important', label: '🟠 Important', cls: 'important' },
      { key: 'low', label: '⚪ Low Priority', cls: 'low' }
    ];

    let html = '<p class="ai-note">✨ Prioritized by AI — most important first</p>';

    for (const group of groups) {
      const items = prioritized[group.key] || [];
      if (items.length === 0) continue;
      html += `<div class="priority-section"><div class="priority-header ${group.cls}">${group.label}</div>`;
      for (const item of items) {
        const email = emails[item.index - 1];
        if (!email) continue;
        html += `<div class="email-item">
          <div class="email-from">${email.from}</div>
          <div class="email-subject">${email.subject}</div>
          <div class="email-summary">${item.summary}</div>
          <div class="email-date">${email.date}</div>
          ${showDelete ? `<div class="email-actions"><button class="email-btn del" onclick="deleteEmail('${email.id}', this)">🗑 Delete</button></div>` : ''}
        </div>`;
      }
      html += '</div>';
    }
    return html;
  }

  async function checkEmails() {
    if (!requireAuth()) return;
    loading('Check Emails', 'Fetching emails...');
    try {
      const emails = await fetchEmailDetails(15);
      if (emails.length === 0) { showOutput('Check Emails', '<p class="no-events">No emails found.</p>'); return; }
      const parsed = emails.map(parseEmailMeta);
      showOutput('Check Emails', '<div class="loading"><div class="spinner"></div>AI is prioritizing your emails...</div>');
      const prioritized = await prioritizeWithAI(parsed);
      showOutput('Check Emails', prioritized
        ? renderPrioritizedEmails(parsed, prioritized, false)
        : parsed.map(e => `<div class="email-item"><div class="email-from">${e.from}</div><div class="email-subject">${e.subject}</div><div class="email-date">${e.date}</div></div>`).join(''));
    } catch (e) {
      showOutput('Check Emails', `<p class="error-msg">Error: ${e.message}</p>`);
    }
  }

  async function deleteEmailsView() {
    if (!requireAuth()) return;
    loading('Delete Emails', 'Fetching emails...');
    try {
      const emails = await fetchEmailDetails(15);
      if (emails.length === 0) { showOutput('Delete Emails', '<p class="no-events">No emails found.</p>'); return; }
      const parsed = emails.map(parseEmailMeta);
      showOutput('Delete Emails', '<div class="loading"><div class="spinner"></div>AI is prioritizing your emails...</div>');
      const prioritized = await prioritizeWithAI(parsed);
      showOutput('Delete Emails', prioritized
        ? renderPrioritizedEmails(parsed, prioritized, true)
        : parsed.map(e => `<div class="email-item"><div class="email-from">${e.from}</div><div class="email-subject">${e.subject}</div><div class="email-date">${e.date}</div><div class="email-actions"><button class="email-btn del" onclick="deleteEmail('${e.id}', this)">🗑 Delete</button></div></div>`).join(''));
    } catch (e) {
      showOutput('Delete Emails', `<p class="error-msg">Error: ${e.message}</p>`);
    }
  }

  async function deleteEmail(msgId, btn) {
    if (!confirm('Delete this email?')) return;
    btn.textContent = 'Deleting...';
    try {
      await fetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${msgId}/trash`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      btn.closest('.email-item').style.opacity = '0.3';
      btn.textContent = 'Deleted';
    } catch (e) {
      btn.textContent = 'Error';
    }
  }

  function showCreateEmail() {
    showOutput('Create Email', `
      <div class="form-group"><label>To</label><input type="email" id="em-to" placeholder="recipient@example.com"></div>
      <div class="form-group"><label>Subject</label><input type="text" id="em-subject" placeholder="Email subject"></div>
      <div class="form-group"><label>Message</label><textarea id="em-body" rows="6" placeholder="Type your message here..."></textarea></div>
      <button class="submit-btn" onclick="sendEmail()">Send Email ✉️</button>
      <div id="send-result" style="margin-top:12px"></div>
    `);
  }

  async function sendEmail() {
    if (!requireAuth()) return;
    const to = document.getElementById('em-to').value.trim();
    const subject = document.getElementById('em-subject').value.trim();
    const body = document.getElementById('em-body').value.trim();
    const resultEl = document.getElementById('send-result');

    if (!to || !subject || !body) {
      resultEl.innerHTML = '<p class="error-msg">Please fill in all fields.</p>';
      return;
    }

    if (!confirm(`Send email to ${to}?`)) return;

    resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>Sending...</div>';

    try {
      const emailContent = [
        `To: ${to}`,
        `Subject: ${subject}`,
        'Content-Type: text/plain; charset=utf-8',
        'MIME-Version: 1.0',
        '',
        body
      ].join('\n');

      const encoded = btoa(unescape(encodeURIComponent(emailContent)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

      const res = await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/send', {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${accessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ raw: encoded })
      });

      if (res.ok) {
        resultEl.innerHTML = `<p class="success-msg">✓ Email sent to ${to}!</p>`;
        document.getElementById('em-to').value = '';
        document.getElementById('em-subject').value = '';
        document.getElementById('em-body').value = '';
      } else {
        const err = await res.json();
        resultEl.innerHTML = `<p class="error-msg">Error: ${err.error?.message}</p>`;
      }
    } catch (e) {
      resultEl.innerHTML = `<p class="error-msg">Error: ${e.message}</p>`;
    }
  }

  function showAddEvent() {
    const today = new Date().toISOString().slice(0, 16);
    showOutput('Add Calendar Event', `
      <div class="form-group"><label>Event Title</label><input type="text" id="ev-title" placeholder="e.g. Doctor appointment"></div>
      <div class="form-group"><label>Date &amp; Time</label><input type="datetime-local" id="ev-start" value="${today}"></div>
      <div class="form-group"><label>Duration</label><select id="ev-duration">
        <option value="30">30 minutes</option>
        <option value="60" selected>1 hour</option>
        <option value="90">1.5 hours</option>
        <option value="120">2 hours</option>
      </select></div>
      <div class="form-group"><label>Calendar</label><select id="ev-calendar">
        <option value="primary">Mine</option>
        <option value="${WIFE_CALENDAR}">Wife's</option>
      </select></div>
      <button class="submit-btn" onclick="addEvent()">Add to Calendar</button>
      <div id="add-result" style="margin-top:12px"></div>
    `);
  }

  async function addEvent() {
    if (!requireAuth()) return;
    const title = document.getElementById('ev-title').value.trim();
    const start = document.getElementById('ev-start').value;
    const duration = parseInt(document.getElementById('ev-duration').value);
    const calId = document.getElementById('ev-calendar').value;
    const resultEl = document.getElementById('add-result');
    if (!title || !start) { resultEl.innerHTML = '<p class="error-msg">Please fill in title and date.</p>'; return; }
    const startDate = new Date(start);
    const endDate = new Date(startDate.getTime() + duration * 60000);
    resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>Adding...</div>';
    try {
      const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          summary: title,
          start: { dateTime: startDate.toISOString() },
          end: { dateTime: endDate.toISOString() }
        })
      });
      if (res.ok) {
        resultEl.innerHTML = `<p class="success-msg">✓ "${title}" added successfully!</p>`;
      } else {
        const err = await res.json();
        resultEl.innerHTML = `<p class="error-msg">Error: ${err.error?.message}</p>`;
      }
    } catch (e) {
      resultEl.innerHTML = `<p class="error-msg">Error: ${e.message}</p>`;
    }
  }

  window.onload = () => {
    const gsiScript = document.querySelector('script[src*="gsi"]');
    if (typeof google !== 'undefined') initGoogle();
    else gsiScript.addEventListener('load', initGoogle);
  };
</script>
</body>
</html>
