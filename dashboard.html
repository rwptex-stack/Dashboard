<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ron's Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222222; --border: #2e2e2e;
    --accent: #c9a84c; --accent2: #e8c97a; --text: #f0ede8; --text-muted: #888;
    --danger: #c0392b; --success: #27ae60; --urgent: #e74c3c; --important: #e67e22; --low: #7f8c8d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 32px 24px; }
  header { text-align: center; margin-bottom: 28px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: var(--accent); letter-spacing: 0.04em; }
  header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  #auth-bar { max-width: 560px; margin: 0 auto 18px; display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 0.85rem; }
  #auth-status-text { color: var(--text-muted); }
  #auth-status-text.signed-in { color: var(--success); }
  #sign-in-btn, #sign-out-btn { border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.85rem; padding: 7px 16px; cursor: pointer; transition: background 0.2s; }
  #sign-in-btn { background: var(--accent); color: #0f0f0f; }
  #sign-in-btn:hover { background: var(--accent2); }
  #sign-out-btn { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  #sign-out-btn:hover { color: var(--danger); border-color: var(--danger); }
  .markets-card { max-width: 560px; margin: 0 auto 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .card-label { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .card-label-time { color: var(--text-muted); font-size: 0.68rem; font-style: italic; text-transform: none; letter-spacing: normal; }
  .mkt-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .mkt-item { display: flex; flex-direction: column; gap: 2px; }
  .mkt-name { font-size: 0.68rem; color: var(--text-muted); }
  .mkt-price { font-size: 0.95rem; font-weight: 500; color: var(--text); }
  .mkt-change { font-size: 0.72rem; }
  .up { color: #27ae60; } .dn { color: #e74c3c; }
  .mkt-loading { color: var(--text-muted); font-size: 0.82rem; font-style: italic; }
  .news-card { max-width: 560px; margin: 0 auto 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .news-section { margin-bottom: 14px; }
  .news-section:last-child { margin-bottom: 0; }
  .news-section-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 8px; }
  .news-item { font-size: 0.82rem; color: #bbb; padding: 4px 0; line-height: 1.45; display: flex; gap: 8px; }
  .news-dot { color: var(--accent); flex-shrink: 0; margin-top: 1px; }
  .comedy-label { display: inline-block; font-size: 0.62rem; background: #2a2000; color: var(--accent); border: 1px solid #3a3000; padding: 1px 6px; border-radius: 8px; vertical-align: middle; margin-left: 6px; letter-spacing: 0.06em; }
  .news-loading { color: var(--text-muted); font-size: 0.82rem; font-style: italic; display: flex; align-items: center; gap: 8px; }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 560px; margin: 0 auto 24px; }
  .btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; padding: 18px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 8px; letter-spacing: 0.03em; }
  .btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
  .btn .icon { font-size: 1.5rem; }
  .btn.wide { grid-column: span 2; }
  .output-box { max-width: 560px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-height: 100px; display: none; }
  .output-box.visible { display: block; }
  .output-box h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .loading { color: var(--text-muted); font-size: 0.9rem; display: flex; align-items: center; gap: 10px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .event-item { padding: 12px 0; border-bottom: 1px solid var(--border); display: flex; gap: 14px; align-items: flex-start; }
  .event-item:last-child { border-bottom: none; }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
  .event-dot.spouse { background: #7eb8d4; }
  .event-title { font-weight: 500; font-size: 0.95rem; }
  .event-time { color: var(--text-muted); font-size: 0.8rem; margin-top: 2px; }
  .event-owner { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; font-style: italic; }
  .legend { display: flex; gap: 16px; margin-bottom: 16px; font-size: 0.8rem; color: var(--text-muted); align-items: center; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .priority-section { margin-bottom: 24px; }
  .priority-header { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; padding: 6px 10px; border-radius: 4px; margin-bottom: 8px; display: inline-block; }
  .priority-header.urgent { background: rgba(231,76,60,0.15); color: var(--urgent); }
  .priority-header.important { background: rgba(230,126,34,0.15); color: var(--important); }
  .priority-header.low { background: rgba(127,140,141,0.15); color: var(--low); }
  .email-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .email-item:last-child { border-bottom: none; }
  .email-from { font-weight: 500; font-size: 0.9rem; }
  .email-subject { font-size: 0.85rem; color: var(--text-muted); margin-top: 3px; }
  .email-summary { font-size: 0.82rem; color: var(--accent2); margin-top: 4px; font-style: italic; }
  .email-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .email-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .email-btn { font-size: 0.75rem; padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .email-btn:hover { border-color: var(--accent); color: var(--accent); }
  .email-btn.del:hover { border-color: var(--danger); color: var(--danger); }
  .email-btn.reply-btn:hover { border-color: var(--success); color: var(--success); }
  .email-body { margin-top: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 14px; font-size: 0.82rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; display: none; }
  .email-body.visible { display: block; }
  .reply-form { margin-top: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 14px; display: none; }
  .reply-form.visible { display: block; }
  .reply-form textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 10px; outline: none; resize: vertical; min-height: 100px; margin-bottom: 10px; transition: border-color 0.2s; }
  .reply-form textarea:focus { border-color: var(--accent); }
  .reply-to { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 8px; }
  .send-reply-btn { background: var(--accent); color: #0f0f0f; border: none; border-radius: 5px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.82rem; padding: 8px 16px; cursor: pointer; }
  .reply-status { font-size: 0.78rem; margin-top: 6px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 10px 12px; outline: none; transition: border-color 0.2s; resize: vertical; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }
  .submit-btn { width: 100%; background: var(--accent); color: #0f0f0f; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; padding: 12px; cursor: pointer; margin-top: 4px; }
  .no-events { color: var(--text-muted); font-size: 0.9rem; font-style: italic; }
  .error-msg { color: #e74c3c; font-size: 0.85rem; }
  .success-msg { color: var(--success); font-size: 0.85rem; }
  .ai-note { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 14px; font-style: italic; }
  .weather-day { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .weather-day:last-child { border-bottom: none; }
  .weather-date { font-size: 0.85rem; font-weight: 500; }
  .weather-desc { font-size: 0.8rem; color: var(--text-muted); }
  .weather-temps { font-size: 0.85rem; text-align: right; }
  .weather-high { color: var(--accent2); font-weight: 500; }
  .weather-low { color: var(--text-muted); }
  .weather-icon { font-size: 1.4rem; margin: 0 12px; }
  .timestamp { text-align: center; font-size: 0.68rem; color: #444; margin-top: 4px; margin-bottom: 20px; }
  .retry-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; text-decoration: underline; padding: 0; }
</style>
</head>
<body>
<header>
  <h1>Ron's Dashboard</h1>
  <p id="header-date">Morning Briefing</p>
</header>

<div id="auth-bar">
  <span id="auth-status-text">Not signed in</span>
  <button id="sign-in-btn" onclick="handleSignIn()">Sign in with Google</button>
  <button id="sign-out-btn" onclick="handleSignOut()" style="display:none">Sign out</button>
</div>

<div class="markets-card">
  <div class="card-label">
    <span>📈 Markets</span>
    <span class="card-label-time" id="markets-time"></span>
  </div>
  <div id="markets-content"><span class="mkt-loading">Loading market data...</span></div>
</div>

<div class="news-card">
  <div class="card-label">📰 Overnight Briefing</div>
  <div id="news-content"><div class="news-loading"><div class="spinner"></div>Fetching overnight news...</div></div>
</div>

<p class="timestamp" id="briefing-timestamp"></p>

<div class="btn-grid">
  <button class="btn" onclick="getTodayCalendar()"><span class="icon">📅</span>Today's Calendar</button>
  <button class="btn" onclick="getWeekCalendar()"><span class="icon">🗓️</span>This Week</button>
  <button class="btn" onclick="checkEmails()"><span class="icon">📬</span>Check Emails</button>
  <button class="btn" onclick="showAddEvent()"><span class="icon">➕</span>Add Event</button>
  <button class="btn" onclick="getTodayWeather()"><span class="icon">🌤️</span>Today's Weather</button>
  <button class="btn" onclick="getThreeDayWeather()"><span class="icon">🌦️</span>3-Day Forecast</button>
  <button class="btn wide" onclick="showCreateEmail()"><span class="icon">✉️</span>Create Email</button>
</div>

<div class="output-box" id="output">
  <h2 id="output-title">Results</h2>
  <div id="output-content"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  const _k = atob('c2stYW50LWFwaTAzLVlocC1NS2w1UVp1ZXN2VDhteUhYdTktNk9pZGpNUTBEcjUyT3VYV2Nsek1saFdBNDFwdlBmMVRXSnNxWWppbnFncUJzQTZ0TmVfdUY5ZTlDUWpld1lnLWdkY08yd0FB');
  const GOOGLE_CLIENT_ID = '131656481327-d7o8c49e8bvvnksg73e418okoi3eaupq.apps.googleusercontent.com';
  const SPOUSE_CALENDAR = 'daptex48@gmail.com';
  const SPOUSE_LABEL = "Dorothy's";
  const MY_LABEL = "Mine";
  const SPOUSE_COLOR = '#7eb8d4';
  const MY_COLOR = 'var(--accent)';
  const SCOPES = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/gmail.modify https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.readonly';
  const TOKEN_KEY = 'ron_dashboard_token';
  const TOKEN_EXPIRY_KEY = 'ron_dashboard_token_expiry';
  const MODEL = 'claude-haiku-4-5-20251001';
  const WEATHER_LAT = 30.5418;
  const WEATHER_LON = -98.3629;

  let tokenClient, accessToken = null;

  function saveToken(t, e) { localStorage.setItem(TOKEN_KEY, t); localStorage.setItem(TOKEN_EXPIRY_KEY, (Date.now() + (e - 300) * 1000).toString()); }
  function loadToken() { const t = localStorage.getItem(TOKEN_KEY); const e = parseInt(localStorage.getItem(TOKEN_EXPIRY_KEY) || '0'); return (t && Date.now() < e) ? t : null; }
  function clearToken() { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(TOKEN_EXPIRY_KEY); }
  function setSignedIn(email) {
    document.getElementById('auth-status-text').textContent = '✓ Signed in' + (email ? ' as ' + email : '');
    document.getElementById('auth-status-text').className = 'signed-in';
    document.getElementById('sign-in-btn').style.display = 'none';
    document.getElementById('sign-out-btn').style.display = 'inline-block';
  }
  function setSignedOut() {
    document.getElementById('auth-status-text').textContent = 'Not signed in';
    document.getElementById('auth-status-text').className = '';
    document.getElementById('sign-in-btn').style.display = 'inline-block';
    document.getElementById('sign-out-btn').style.display = 'none';
    accessToken = null; clearToken();
  }
  function handleSignOut() { setSignedOut(); document.getElementById('output').classList.remove('visible'); }
  function initGoogle() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID, scope: SCOPES,
      callback: (resp) => {
        if (resp.error) return;
        accessToken = resp.access_token;
        saveToken(accessToken, resp.expires_in || 3600);
        setSignedIn('');
        fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${accessToken}` } })
          .then(r => r.json()).then(info => { if (info.email) setSignedIn(info.email); }).catch(() => {});
      }
    });
    const saved = loadToken();
    if (saved) {
      accessToken = saved; setSignedIn('');
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${accessToken}` } })
        .then(r => r.json()).then(info => { if (info.email) setSignedIn(info.email); else setSignedOut(); })
        .catch(() => setSignedOut());
    }
  }
  function handleSignIn() { tokenClient.requestAccessToken({ prompt: '' }); }
  function requireAuth() { if (!accessToken) { showOutput('Sign In Required', '<p class="error-msg">Please sign in with Google first.</p>'); return false; } return true; }
  function showOutput(title, html) { document.getElementById('output-title').textContent = title; document.getElementById('output-content').innerHTML = html; document.getElementById('output').classList.add('visible'); document.getElementById('output').scrollIntoView({ behavior: 'smooth' }); }
  function loading(title, msg) { showOutput(title, `<div class="loading"><div class="spinner"></div>${msg || 'Loading...'}</div>`); }
  function formatTime(dt) { return dt ? new Date(dt).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) : 'All day'; }
  function formatDate(dt) { return dt ? new Date(dt).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) : ''; }
  function getDayKey() { const d = new Date(); return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate(); }

  async function callAI(prompt, maxTokens) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': _k, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: MODEL, max_tokens: maxTokens || 600, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error((data.error && data.error.message) || ('HTTP ' + res.status));
    return data.content?.[0]?.text || '';
  }

  // --- Markets ---
  function fmtChange(change, pct, isBond) {
    const sign = change >= 0 ? '▲' : '▼';
    const cls = change >= 0 ? 'up' : 'dn';
    if (isBond) return `<span class="${cls}">${sign} ${change >= 0 ? '+' : ''}${change.toFixed(2)}</span>`;
    return `<span class="${cls}">${sign} ${change >= 0 ? '+' : ''}${change.toFixed(2)} (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)</span>`;
  }

  async function loadMarkets() {
    const el = document.getElementById('markets-content');
    const timeEl = document.getElementById('markets-time');
    el.innerHTML = '<span class="mkt-loading">Loading market data...</span>';
    try {
      const symbols = ['^GSPC', '^DJI', '^IXIC', '^TNX', 'GC=F'];
      const yfRaw = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(',')}&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent,regularMarketPreviousClose`;
      // Use corsproxy.io to bypass CORS restrictions on GitHub Pages
      const yfUrl = `https://corsproxy.io/?${encodeURIComponent(yfRaw)}`;

      const [yfRes, btcRes] = await Promise.all([
        fetch(yfUrl),
        fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true')
      ]);

      const yfData = await yfRes.json();
      const btcData = await btcRes.json();
      const quotes = yfData.quoteResponse?.result || [];

      function q(sym) { return quotes.find(x => x.symbol === sym); }
      const sp = q('^GSPC'), dow = q('^DJI'), nq = q('^IXIC'), tny = q('^TNX'), gold = q('GC=F');
      const btc = btcData.bitcoin;

      function mktItem(name, price, change, pct, isBond, prefix) {
        if (!price && price !== 0) return `<div class="mkt-item"><div class="mkt-name">${name}</div><div class="mkt-price" style="color:var(--text-muted)">—</div></div>`;
        const priceStr = isBond ? price.toFixed(2) + '%' : (prefix || '') + price.toLocaleString('en-US', { maximumFractionDigits: 0 });
        return `<div class="mkt-item"><div class="mkt-name">${name}</div><div class="mkt-price">${priceStr}</div><div class="mkt-change">${fmtChange(change, pct, isBond)}</div></div>`;
      }
      const btcChange = btc ? btc.usd * (btc.usd_24h_change / 100) : 0;

      el.innerHTML = `<div class="mkt-grid">
        ${mktItem('S&P 500', sp?.regularMarketPrice, sp?.regularMarketChange, sp?.regularMarketChangePercent)}
        ${mktItem('Dow', dow?.regularMarketPrice, dow?.regularMarketChange, dow?.regularMarketChangePercent)}
        ${mktItem('Nasdaq', nq?.regularMarketPrice, nq?.regularMarketChange, nq?.regularMarketChangePercent)}
        ${mktItem('10yr Treasury', tny?.regularMarketPrice, tny?.regularMarketChange, tny?.regularMarketChangePercent, true)}
        ${mktItem('Gold', gold?.regularMarketPrice, gold?.regularMarketChange, gold?.regularMarketChangePercent, false, '$')}
        ${btc ? mktItem('Bitcoin', Math.round(btc.usd), btcChange, btc.usd_24h_change, false, '$') : mktItem('Bitcoin', null)}
      </div>`;
      timeEl.textContent = 'as of ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    } catch(e) {
      el.innerHTML = `<span class="mkt-loading">Markets unavailable — ${e.message}. <button class="retry-btn" onclick="loadMarkets()">Retry</button></span>`;
    }
  }

  // --- News Briefing ---
  async function fetchRSS(url, count) {
    const n = count || 6;
    // Try rss2json first
    try {
      const r = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=${n}`, { signal: AbortSignal.timeout(6000) });
      const d = await r.json();
      if (d.items && d.items.length > 0) return d.items.map(i => i.title).filter(Boolean);
    } catch(e) {}
    // Fallback: allorigins.win CORS proxy + parse XML ourselves
    try {
      const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(8000) });
      const d = await r.json();
      const parser = new DOMParser();
      const xml = parser.parseFromString(d.contents, 'text/xml');
      const items = [...xml.querySelectorAll('item')].slice(0, n);
      return items.map(i => i.querySelector('title')?.textContent?.trim()).filter(Boolean);
    } catch(e) {}
    return [];
  }

  async function loadNewsBriefing() {
    const el = document.getElementById('news-content');
    const tsEl = document.getElementById('briefing-timestamp');
    const cacheKey = 'ron_briefing_' + getDayKey();
    try {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        el.innerHTML = cached;
        tsEl.textContent = 'Briefing cached for today · ' + new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        return;
      }
    } catch(e) {}

    el.innerHTML = '<div class="news-loading"><div class="spinner"></div>Fetching overnight headlines...</div>';

    try {
      const [reutersBiz, reutersTop, marketwatch, rcp, ars, verge, bbc, reutersWorld, wapo, nyt, lat] = await Promise.all([
        fetchRSS('https://feeds.reuters.com/reuters/businessNews', 6),
        fetchRSS('https://feeds.reuters.com/reuters/topNews', 6),
        fetchRSS('https://feeds.marketwatch.com/marketwatch/topstories/', 6),
        fetchRSS('https://www.realclearpolitics.com/index.xml', 6),
        fetchRSS('https://feeds.arstechnica.com/arstechnica/index', 5),
        fetchRSS('https://www.theverge.com/rss/index.xml', 5),
        fetchRSS('https://feeds.bbci.co.uk/news/world/rss.xml', 7),
        fetchRSS('https://feeds.reuters.com/Reuters/worldNews', 7),
        fetchRSS('https://feeds.washingtonpost.com/rss/national', 5),
        fetchRSS('https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml', 5),
        fetchRSS('https://www.latimes.com/rss2.0.xml', 5)
      ]);

      const mkts = [...new Set([...reutersBiz, ...marketwatch])].slice(0, 10).join('\n');
      const pol  = [...new Set([...reutersTop, ...rcp])].slice(0, 10).join('\n');
      const intl = [...new Set([...bbc, ...reutersWorld])].slice(0, 10).join('\n');
      const tech = [...new Set([...ars, ...verge])].slice(0, 8).join('\n');
      const cmdy = [...new Set([...wapo, ...nyt, ...lat])].slice(0, 8).join('\n');

      const prompt = `You are Ron's morning briefing assistant. Ron is a conservative-leaning investor in his 60s-70s in Texas interested in markets, Fed policy, interest rates, gold, bitcoin, politics, international news, and technology.

Summarize the overnight headlines below into a concise morning briefing. Write 3-4 short bullet points per section (one sentence each). Be factual and neutral in Markets/Politics/International/Tech. For "Light Reading" (WaPo/NYT/LAT), you may be wryly observational about media spin if warranted.

Return ONLY valid JSON:
{"markets":["bullet","bullet","bullet"],"politics":["bullet","bullet","bullet"],"international":["bullet","bullet","bullet"],"tech":["bullet","bullet","bullet"],"comedy":["bullet","bullet","bullet"]}

MARKETS & FED:\n${mkts || '(unavailable)'}
POLITICS:\n${pol || '(unavailable)'}
INTERNATIONAL (BBC/Reuters World):\n${intl || '(unavailable)'}
TECH:\n${tech || '(unavailable)'}
WAPO/NYT/LAT:\n${cmdy || '(unavailable)'}`;

      const aiText = await callAI(prompt, 900);
      const json = JSON.parse(aiText.replace(/```json|```/g, '').trim());

      function section(title, bullets, isComedy) {
        const hdr = isComedy
          ? `<div class="news-section-title">Light Reading <span class="comedy-label">WaPo · NYT · LAT</span></div>`
          : `<div class="news-section-title">${title}</div>`;

        return `<div class="news-section">${hdr}${items}</div>`;
      }

      const html = section('Markets &amp; Fed', json.markets)
        + section('Politics', json.politics)
        + section('🌍 International', json.international)
        + section('Tech', json.tech)
        + section('', json.comedy, true);

      el.innerHTML = html;
      tsEl.textContent = 'Generated at ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) + ' · ' + new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

      try {
        Object.keys(localStorage).forEach(k => { if (k.startsWith('ron_briefing_') && k !== cacheKey) localStorage.removeItem(k); });
        localStorage.setItem(cacheKey, html);
      } catch(e) {}

    } catch(e) {
      el.innerHTML = `<span class="mkt-loading">Briefing unavailable — ${e.message}. <button class="retry-btn" onclick="loadNewsBriefing()">Retry</button></span>`;
    }
  }

  // --- Email ---
  async function fetchEmailDetails(max) {
    const ago = Math.floor((Date.now()-30*24*60*60*1000)/1000);
    const r = await fetch(`https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=${max||15}&labelIds=INBOX&labelIds=UNREAD&q=after:${ago}`, { headers:{Authorization:`Bearer ${accessToken}`} });
    const d = await r.json(); if (!d.messages) return [];
    return Promise.all(d.messages.map(m => fetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date&metadataHeaders=Reply-To`, { headers:{Authorization:`Bearer ${accessToken}`} }).then(r=>r.json())));
  }
  function parseEmailMeta(msg) {
    const h = msg.payload?.headers||[];
    const from = h.find(x=>x.name==='From')?.value||'Unknown';
    const subject = h.find(x=>x.name==='Subject')?.value||'(No subject)';
    const date = h.find(x=>x.name==='Date')?.value||'';
    const replyTo = h.find(x=>x.name==='Reply-To')?.value||from;
    const fromName = from.replace(/<.*>/,'').trim()||from;
    const replyEmail = (replyTo.match(/<(.+)>/)||[])[1]||replyTo;
    const d = date ? new Date(date).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
    return { id:msg.id, from:fromName, replyEmail, subject, date:d };
  }
  async function fetchEmailBody(msgId) {
    const r = await fetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${msgId}?format=full`, { headers:{Authorization:`Bearer ${accessToken}`} });
    const data = await r.json();
    function decode(d) { return decodeURIComponent(escape(atob(d.replace(/-/g,'+').replace(/_/g,'/')))); }
    function extractPart(p, mt) {
      if (!p) return null;
      if (p.mimeType===mt && p.body?.data) return decode(p.body.data);
      if (p.parts) { for (const pt of p.parts) { const r=extractPart(pt,mt); if(r) return r; } }
      return null;
    }
    const plain = extractPart(data.payload,'text/plain');
    if (plain) return {type:'text',content:plain};
    const html = extractPart(data.payload,'text/html');
    if (html) return {type:'html',content:html};
    return {type:'text',content:'(No readable content)'};
  }
  async function toggleRead(msgId, btn) {
    const bodyEl = document.getElementById('body-'+msgId);
    if (bodyEl.classList.contains('visible')) { bodyEl.classList.remove('visible'); btn.textContent='📖 Read'; return; }
    btn.textContent='Loading...';
    try {
      const result = await fetchEmailBody(msgId);
      if (result.type==='html') {
        bodyEl.innerHTML=''; const iframe=document.createElement('iframe');
        iframe.style.cssText='width:100%;border:none;min-height:300px;background:white;border-radius:4px;';
        iframe.sandbox='allow-same-origin'; bodyEl.appendChild(iframe); bodyEl.classList.add('visible');
        iframe.contentDocument.open(); iframe.contentDocument.write(result.content); iframe.contentDocument.close();
        setTimeout(()=>{ iframe.style.height=iframe.contentDocument.body.scrollHeight+'px'; },300);
      } else { bodyEl.textContent=result.content; bodyEl.classList.add('visible'); }
      btn.textContent='📖 Hide';
    } catch(e) { bodyEl.textContent='Error loading email.'; bodyEl.classList.add('visible'); btn.textContent='📖 Hide'; }
  }
  function toggleReply(msgId) {
    const el=document.getElementById('reply-'+msgId);

  async function sendReply(msgId, replyEmail, subject, btn) {
    const ta=document.getElementById('reply-'+msgId).querySelector('textarea');
    const body=ta.value.trim(); const statusEl=document.getElementById('reply-status-'+msgId);
    if(!body){statusEl.innerHTML='<span style="color:var(--danger)">Please type a reply.</span>';return;}
    btn.textContent='Sending...';

      const subj=subject.startsWith('Re:')?subject:'Re: '+subject;
      const ec=[`To: ${replyEmail}`,`Subject: ${subj}`,'Content-Type: text/plain; charset=utf-8','MIME-Version: 1.0','',body].join('\n');
      const encoded=btoa(unescape(encodeURIComponent(ec))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
      const r=await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/send',{method:'POST',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({raw:encoded})});
      if(r.ok){statusEl.innerHTML='<span style="color:var(--success)">✓ Reply sent!</span>';ta.value='';setTimeout(()=>{document.getElementById('reply-'+msgId).classList.remove('visible');statusEl.innerHTML='';},2000);}
      else{const err=await r.json();statusEl.innerHTML=`<span style="color:var(--danger)">Error: ${err.error?.message}</span>`;}
    } catch(e){statusEl.innerHTML=`<span style="color:var(--danger)">Error: ${e.message}</span>`;}
    btn.textContent='Send Reply';
  }

  async function prioritizeWithAI(emails) {
    const list=emails.map((e,i)=>`${i+1}. From: ${e.from} | Subject: ${e.subject} | Date: ${e.date}`).join('\n');
    const text=await callAI(`Prioritize these emails into URGENT, IMPORTANT, LOW. One-sentence summary each. JSON only: {"urgent":[{"index":1,"summary":"..."}],"important":[...],"low":[...]}\nEmails:\n${list}`,600);
    try{return JSON.parse(text.replace(/```json|```/g,'').trim());}catch{return null;}
  }
  function renderPrioritizedEmails(emails,p) {
    const groups=[{key:'urgent',label:'🔴 Urgent',cls:'urgent'},{key:'important',label:'🟠 Important',cls:'important'},{key:'low',label:'⚪ Low Priority',cls:'low'}];
    let html='<p class="ai-note">✨ Unread emails — prioritized by AI</p>';
    for(const g of groups){
      const items=p[g.key]||[]; if(!items.length)continue;
      html+=`<div class="priority-section"><div class="priority-header ${g.cls}">${g.label}</div>`;
      for(const item of items){const e=emails[item.index-1];if(!e)continue;html+=`<div class="email-item"><div class="email-from">${e.from}</div><div class="email-subject">${e.subject}</div><div class="email-summary">${item.summary}</div><div class="email-date">${e.date}</div>${emailActionsHTML(e)}</div>`;}
      html+='</div>';
    }
    return html;
  }

      if(r.ok)resultEl.innerHTML=`<p class="success-msg">✓ "${title}" added successfully!</p>`;
      else{const err=await r.json();resultEl.innerHTML=`<p class="error-msg">Error: ${err.error?.message}</p>`;}
    }catch(e){resultEl.innerHTML=`<p class="error-msg">Error: ${e.message}</p>`;}
  }

  function init() {
    document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    loadMarkets();
    loadNewsBriefing();
  }
  window.onload = init;
  window.onGoogleLibraryLoad = initGoogle;
</script>
</body>
</html>
