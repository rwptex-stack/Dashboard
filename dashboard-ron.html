<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ron's Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;--accent:#c9a84c;--accent2:#e8c97a;--text:#f0ede8;--text-muted:#888;--danger:#c0392b;--success:#27ae60;--urgent:#e74c3c;--important:#e67e22;--low:#7f8c8d}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:32px 24px}
header{text-align:center;margin-bottom:28px}
header h1{font-family:'Playfair Display',serif;font-size:2.4rem;color:var(--accent);letter-spacing:.04em}
header p{color:var(--text-muted);font-size:.85rem;margin-top:6px;letter-spacing:.08em;text-transform:uppercase}
#auth-bar{max-width:560px;margin:0 auto 18px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:.85rem}
#auth-status-text{color:var(--text-muted)}
#auth-status-text.signed-in{color:var(--success)}
#sign-in-btn,#sign-out-btn{border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;padding:7px 16px;cursor:pointer}
#sign-in-btn{background:var(--accent);color:#0f0f0f}
#sign-out-btn{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}
.card{max-width:560px;margin:0 auto 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.card-label{color:var(--accent);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.news-section{margin-bottom:14px}
.news-section:last-child{margin-bottom:0}
.news-section-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:8px}
.news-item{font-size:.82rem;color:#bbb;padding:4px 0;line-height:1.45;display:flex;gap:8px;cursor:pointer;transition:color .2s;text-decoration:none}
.news-item:hover{color:var(--accent2)}
.news-dot{color:var(--accent);flex-shrink:0;font-weight:bold}
.news-dot::before{content:'→ ';margin-right:4px}
.tag{display:inline-block;font-size:.62rem;background:#2a2000;color:var(--accent);border:1px solid #3a3000;padding:1px 6px;border-radius:8px;vertical-align:middle;margin-left:6px}
.status{color:var(--text-muted);font-size:.82rem;font-style:italic;display:flex;align-items:center;gap:8px}
.feed-health{font-size:.72rem;color:var(--text-muted);padding-bottom:8px}
.feed-health.warn{color:#e67e22}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;max-width:560px;margin:0 auto 24px}
.c3{grid-column:span 3}.c4{grid-column:span 4}.c5{grid-column:span 5}.c6{grid-column:span 6}
.btn.sm{padding:12px 8px;font-size:.8rem}
.btn.sm .icon{font-size:1.2rem}
.badge{position:absolute;top:8px;right:10px;background:var(--danger);color:#fff;border-radius:9px;font-size:.68rem;font-weight:600;min-width:18px;height:18px;display:none;align-items:center;justify-content:center;padding:0 5px;line-height:1}
.btn{position:relative;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;padding:18px 16px;border-radius:10px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px}
.btn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent)}
.btn .icon{font-size:1.5rem}
.btn.wide{grid-column:span 2}
.small-btn{background:var(--accent);color:#0f0f0f;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.78rem;padding:5px 14px;cursor:pointer}
.out-box{max-width:560px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;min-height:100px;display:none}
.out-box.visible{display:block}
.out-box h2{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--accent);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.loading{color:var(--text-muted);font-size:.9rem;display:flex;align-items:center;gap:10px}
.ev-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:flex-start}
.ev-item:last-child{border-bottom:none}
.ev-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0}
.ev-dot.sp{background:#7eb8d4}
.ev-title{font-weight:500;font-size:.95rem}
.ev-time{color:var(--text-muted);font-size:.8rem;margin-top:2px}
.ev-owner{font-size:.75rem;color:var(--text-muted);margin-top:2px;font-style:italic}
.legend{display:flex;gap:16px;margin-bottom:16px;font-size:.8rem;color:var(--text-muted)}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.em-item{padding:12px 0;border-bottom:1px solid var(--border)}
.em-item:last-child{border-bottom:none}
.em-from{font-weight:500;font-size:.9rem}
.em-subj{font-size:.85rem;color:var(--text-muted);margin-top:3px}
.em-sum{font-size:.82rem;color:var(--accent2);margin-top:4px;font-style:italic}
.em-date{font-size:.75rem;color:var(--text-muted);margin-top:3px}
.em-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.em-btn{font-size:.75rem;padding:5px 12px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif}
.em-btn:hover{border-color:var(--accent);color:var(--accent)}
.em-body{margin-top:10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px;font-size:.82rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;display:none}
.em-body.show{display:block}
.reply-form{margin-top:10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px;display:none}
.reply-form.show{display:block}
.reply-form textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;padding:10px;outline:none;resize:vertical;min-height:100px;margin-bottom:10px}
.send-btn{background:var(--accent);color:#0f0f0f;border:none;border-radius:5px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.82rem;padding:8px 16px;cursor:pointer}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.8rem;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg select,.fg textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;padding:10px 12px;outline:none;resize:vertical}
.sub-btn{width:100%;background:var(--accent);color:#0f0f0f;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;padding:12px;cursor:pointer;margin-top:4px}
.no-ev{color:var(--text-muted);font-size:.9rem;font-style:italic}
.err{color:#e74c3c;font-size:.85rem}
.ok{color:var(--success);font-size:.85rem}
.wx-day{padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.wx-day:last-child{border-bottom:none}
.wx-icon{font-size:1.4rem;margin:0 12px}
.ts{text-align:center;font-size:.68rem;color:#444;margin-top:4px;margin-bottom:20px}
.idx-block{margin-bottom:10px}
.idx-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.82rem}
.idx-name{color:var(--text-muted)}
.idx-price{color:var(--text);margin-right:8px}
.idx-chg{font-weight:600}
.idx-chg.up{color:var(--success)}
.idx-chg.down{color:var(--urgent)}
</style>
</head>
<body>
<header>
  <h1>Ron's Dashboard</h1>
  <p id="hdr-date">Morning Briefing</p>
</header>

<div id="auth-bar">
  <span id="auth-status-text">Not signed in</span>
  <button id="sign-in-btn" onclick="signIn()">Sign in with Google</button>
  <button id="sign-out-btn" onclick="signOut()" style="display:none">Sign out</button>
</div>

<div class="card">
  <div class="card-label">
    <span>Morning Briefing</span>
    <button class="small-btn" id="brief-btn" onclick="loadBriefing(this.textContent==='Refresh')">Load Briefing</button>
  </div>
  <div id="brief-body"><div class="status">Click Load Briefing to fetch today's news</div></div>
  <p class="ts" id="brief-ts"></p>
</div>

<div class="btn-grid">
  <button class="btn c5" onclick="calToday()"><span class="icon">📅</span>Today's Calendar</button>
  <button class="btn c4" onclick="calWeek()"><span class="icon">🗓️</span>This Week</button>
  <button class="btn c3 sm" onclick="addEventForm()"><span class="icon">➕</span>Add Event</button>
  <button class="btn c6" onclick="checkEmail()"><span class="icon">📬</span>Check Emails<span class="badge" id="em-badge"></span></button>
  <button class="btn c6" onclick="composeEmail()"><span class="icon">✉️</span>Create Email</button>
  <button class="btn c6" onclick="wxToday()"><span class="icon">🌤️</span>Today's Weather</button>
  <button class="btn c6" onclick="wx3day()"><span class="icon">🌦️</span>3-Day Forecast</button>
</div>

<div class="out-box" id="out">
  <h2 id="out-title">Results</h2>
  <div id="out-body"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const GID = '131656481327-d7o8c49e8bvvnksg73e418okoi3eaupq.apps.googleusercontent.com';
const SPOUSE_CAL = 'daptex48@gmail.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/gmail.modify https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.readonly';
const LAT = 30.5418, LON = -98.3629;
const TK = 'ron_tk', TX = 'ron_tx';
let tc, tok = null;

function saveTok(t,e){localStorage.setItem(TK,t);localStorage.setItem(TX,(Date.now()+(e-300)*1000).toString())}
function loadTok(){const t=localStorage.getItem(TK),e=+localStorage.getItem(TX)||0;return(t&&Date.now()<e)?t:null}
function clearTok(){localStorage.removeItem(TK);localStorage.removeItem(TX)}
function setUI(email){
  document.getElementById('auth-status-text').textContent=email?'Signed in as '+email:'Signed in';
  document.getElementById('auth-status-text').className='signed-in';
  document.getElementById('sign-in-btn').style.display='none';
  document.getElementById('sign-out-btn').style.display='inline-block';
  updateEmailBadge();
}
function signOut(){
  document.getElementById('auth-status-text').textContent='Not signed in';
  document.getElementById('auth-status-text').className='';
  document.getElementById('sign-in-btn').style.display='inline-block';
  document.getElementById('sign-out-btn').style.display='none';
  tok=null;clearTok();document.getElementById('out').classList.remove('visible');
  updateEmailBadge();
}
function initGoogle(){
  tc=google.accounts.oauth2.initTokenClient({
    client_id:GID,scope:SCOPES,
    callback:(r)=>{
      if(r.error)return;
      tok=r.access_token;saveTok(tok,r.expires_in||3600);setUI('');
      fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+tok}})
        .then(r=>r.json()).then(d=>{if(d.email)setUI(d.email)}).catch(()=>{});
    }
  });
  const saved=loadTok();
  if(saved){
    tok=saved;
    fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+tok}})
      .then(r=>r.json()).then(d=>{if(d.email)setUI(d.email);else signOut()}).catch(signOut);
  }
}
function signIn(){tc.requestAccessToken({prompt:''})}
function needAuth(){if(!tok){showOut('Sign In Required','<p class="err">Please sign in with Google first.</p>');return false}return true}
function showOut(t,h){document.getElementById('out-title').textContent=t;document.getElementById('out-body').innerHTML=h;document.getElementById('out').classList.add('visible');document.getElementById('out').scrollIntoView({behavior:'smooth'})}
function busy(t,m){showOut(t,'<div class="loading"><div class="spinner"></div>'+(m||'Loading...')+'</div>')}
function fmtT(dt){return dt?new Date(dt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}):'All day'}
function fmtD(dt){if(!dt)return'';const d=/^\d{4}-\d{2}-\d{2}$/.test(dt)?new Date(dt+'T00:00:00'):new Date(dt);return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function dayKey(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}

function tFetch(url,ms){
  const c=new AbortController(),t=setTimeout(()=>c.abort(),ms);
  return fetch(url,{signal:c.signal}).finally(()=>clearTimeout(t));
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dedupe(arr){
  const seen=new Set(),out=[];
  for(const o of arr){if(o&&o.title&&!seen.has(o.title)){seen.add(o.title);out.push(o);}}
  return out;
}
async function getRSS(url,n){
  n=n||6;
  function parseXML(txt){
    try{
      const xml=new DOMParser().parseFromString(txt,'text/xml');
      return[...xml.querySelectorAll('item,entry')].slice(0,n)
        .map(i=>{
          const title=i.querySelector('title')?.textContent?.replace(/<!\[CDATA\[|\]\]>/g,'').trim();
          const linkEl=i.querySelector('link');
          const link=(linkEl?.getAttribute('href'))||(linkEl?.textContent?.trim())||'';
          return{title,link};
        })
        .filter(o=>o.title&&o.title.length>5);
    }catch(e){return[];}
  }
  const[r1,r2]=await Promise.all([
    tFetch('https://corsproxy.io/?'+encodeURIComponent(url),14000)
      .then(r=>r.ok?r.text().then(parseXML):[]).catch(()=>[]),
    tFetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(url)+'&count='+n,14000)
      .then(r=>r.json()).then(d=>(d.items||[]).map(i=>({title:i.title,link:i.link||''})).filter(o=>o.title)).catch(()=>[])
  ]);
  return(r1.length?r1:r2).slice(0,n);
}
async function fetchIndex(sym,name){
  const url='https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=1d&range=5d';
  const proxies=[
    'https://corsproxy.io/?'+encodeURIComponent(url),
    'https://api.allorigins.win/raw?url='+encodeURIComponent(url)
  ];
  for(const p of proxies){
    try{
      const r=await tFetch(p,14000);
      if(!r.ok)continue;
      const d=await r.json();
      const meta=d?.chart?.result?.[0]?.meta;
      const price=meta?.regularMarketPrice,prev=meta?.chartPreviousClose;
      if(isFinite(price)&&isFinite(prev)&&prev!==0)return{name,price,pct:(price-prev)/prev*100};
    }catch(e){}
  }
  return null;
}
const IDX_CACHE_KEY='ron_idx_cache';
async function getIndices(){
  const syms=[['^GSPC','S&amp;P 500'],['^DJI','Dow Jones'],['^IXIC','Nasdaq'],['GC=F','Gold'],['BTC-USD','Bitcoin'],['SPCX','SpaceX']];
  const results=await Promise.all(syms.map(([sym,name])=>fetchIndex(sym,name)));
  const fresh=results.filter(Boolean);
  if(fresh.length){
    try{localStorage.setItem(IDX_CACHE_KEY,JSON.stringify({data:fresh,ts:Date.now()}));}catch(e){}
    return{data:fresh,stale:false};
  }
  try{
    const cached=JSON.parse(localStorage.getItem(IDX_CACHE_KEY)||'null');
    if(cached&&cached.data&&cached.data.length)return{data:cached.data,stale:true,ts:cached.ts};
  }catch(e){}
  return{data:[],stale:false};
}
function idxBlock(result){
  if(!result||!result.data||!result.data.length)return'';
  const rows=result.data.map(i=>{
    const up=i.pct>=0,cls=up?'up':'down',arrow=up?'▲':'▼';
    return'<div class="idx-row"><span class="idx-name">'+i.name+'</span><span><span class="idx-price">'+i.price.toLocaleString('en-US',{maximumFractionDigits:2})+'</span><span class="idx-chg '+cls+'">'+arrow+' '+(up?'+':'')+i.pct.toFixed(2)+'%</span></span></div>';
  }).join('');
  const note=result.stale?'<div class="status" style="padding:0 0 4px;font-size:.7rem">Live fetch failed — showing last known values from '+new Date(result.ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})+'</div>':'';
  return'<div class="idx-block">'+note+rows+'</div>';
}
async function loadBriefing(force){
  const el=document.getElementById('brief-body'),ts=document.getElementById('brief-ts'),btn=document.getElementById('brief-btn');
  const ck='ron_brief_v3_'+dayKey();
  if(!force){
    try{const c=localStorage.getItem(ck);if(c){el.innerHTML=c;ts.textContent='Cached for today · click Refresh for the latest';btn.textContent='Refresh';return;}}catch(e){}
  }
  btn.disabled=true;btn.textContent='Loading...';
  el.innerHTML='<div class="status"><div class="spinner"></div>Fetching headlines from 9 feeds + market data...</div>';
  const[mw,fox,rcp,hill,ars,vg,bbcW,bbcT,nyt,indices]=await Promise.all([
    getRSS('https://feeds.marketwatch.com/marketwatch/topstories/',6),
    getRSS('https://feeds.foxnews.com/foxnews/latest',6),
    getRSS('https://www.realclearpolitics.com/index.xml',6),
    getRSS('https://thehill.com/rss/syndicator/19110',5),
    getRSS('https://feeds.arstechnica.com/arstechnica/index',5),
    getRSS('https://www.theverge.com/rss/index.xml',5),
    getRSS('https://feeds.bbci.co.uk/news/world/rss.xml',7),
    getRSS('https://feeds.bbci.co.uk/news/rss.xml',6),
    getRSS('https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml',5),
    getIndices()
  ]);
  const totalItems=mw.length+fox.length+rcp.length+hill.length+ars.length+vg.length+bbcW.length+bbcT.length+nyt.length;
  if(totalItems===0){
    el.innerHTML='<div class="status"><span class="err">Could not fetch headlines right now.</span> <button class="small-btn" onclick="loadBriefing(true)">Retry</button></div>';
    ts.textContent='';
    btn.disabled=false;btn.textContent='Refresh';
    return;
  }
  function sec(title,items,tag,extra){
    const h='<div class="news-section-title">'+title+(tag?'<span class="tag">'+tag+'</span>':'')+'</div>';
    return'<div class="news-section">'+h+(extra||'')+(items||[]).map(i=>{
      const t=esc(i.title||''),href=i.link?esc(i.link):'';
      const inner='<span class="news-dot">·</span>'+t;
      return href?'<a class="news-item" href="'+href+'" target="_blank" rel="noopener noreferrer">'+inner+'</a>':'<div class="news-item">'+inner+'</div>';
    }).join('')+'</div>';
  }
  const feedList=[['MarketWatch',mw],['Fox News',fox],['Real Clear Politics',rcp],['The Hill',hill],['Ars Technica',ars],['The Verge',vg],['BBC World',bbcW],['BBC News',bbcT],['NY Times',nyt]];
  const failedFeeds=feedList.filter(f=>!f[1].length).map(f=>f[0]);
  const health=failedFeeds.length
    ?'<div class="feed-health warn">⚠️ '+(feedList.length-failedFeeds.length)+' of '+feedList.length+' feeds loaded — no response from: '+failedFeeds.join(', ')+' (try Refresh)</div>'
    :'<div class="feed-health">✓ All '+feedList.length+' feeds loaded</div>';
  const mwItems=dedupe(mw).slice(0,6),idxHtml=idxBlock(indices);
  const marketsExtra=idxHtml||(mwItems.length?'':'<div class="status" style="padding:2px 0 6px">No market data available right now — try Refresh.</div>');
  const html=health+sec('Markets &amp; Economy',mwItems,'',marketsExtra)+
             sec('Politics',dedupe([...fox,...rcp,...hill]).slice(0,8))+
             sec('International',dedupe([...bbcW,...bbcT]).slice(0,8))+
             sec('Tech',dedupe([...ars,...vg]).slice(0,6))+
             sec('Light Reading',dedupe(nyt),'');
  el.innerHTML=html;
  ts.textContent='Loaded '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})+' · '+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  try{Object.keys(localStorage).filter(k=>k.startsWith('ron_brief_')&&k!==ck).forEach(k=>localStorage.removeItem(k));localStorage.setItem(ck,html);}catch(e){}
  btn.disabled=false;btn.textContent='Refresh';
}

function wxIcon(c){return c<=1?'☀️':c<=3?'⛅':c<=48?'🌫️':c<=67?'🌧️':c<=77?'❄️':c<=82?'🌦️':'⛈️'}
function wxDesc(c){return c===0?'Clear sky':c===1?'Mainly clear':c===2?'Partly cloudy':c===3?'Overcast':c<=48?'Foggy':c<=55?'Drizzle':c<=67?'Rain':c<=77?'Snow':c<=82?'Rain showers':'Thunderstorm'}
async function getWx(){
  const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+LAT+'&longitude='+LON+'&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&timezone=America%2FChicago&forecast_days=3');
  return r.json();
}
async function wxToday(){
  busy("Today's Weather — Horseshoe Bay, TX");
  try{

async function fetchCal(calId,tMin,tMax){
  const p=new URLSearchParams({timeMin:tMin,timeMax:tMax,singleEvents:true,orderBy:'startTime',maxResults:20});
  const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(calId)+'/events?'+p,{headers:{Authorization:'Bearer '+tok}});
  if(!r.ok)return null;return(await r.json()).items||[];
}
function renderCal(mine,spouse,showDate){
  const spErr=spouse===null,mErr=mine===null;
  mine=mine||[];spouse=spouse||[];
  let warn='';
  if(mErr)warn+='<p class="err" style="font-size:.8rem">⚠️ Could not read your calendar. Try signing out and back in.</p>';
  if(spErr)warn+='<p class="err" style="font-size:.8rem">⚠️ Could not read Dorothy\'s calendar ('+SPOUSE_CAL+'). Her calendar may not be shared with the Google account you signed in with — check the sharing settings in her Google Calendar, and check which account you used to sign in here.</p>';
  const all=[...mine.map(e=>({...e,sp:false})),...spouse.map(e=>({...e,sp:true}))]
    .sort((a,b)=>(a.start?.dateTime||a.start?.date||'').localeCompare(b.start?.dateTime||b.start?.date||''));
  if(!all.length)return warn+'<p class="no-ev">No events found.</p>';
  const legend=warn+'<div class="legend"><span><span class="ldot" style="background:var(--accent)"></span>Mine</span><span><span class="ldot" style="background:#7eb8d4"></span>Dorothy\'s</span></div>';
  return legend+all.map(e=>'<div class="ev-item"><div class="ev-dot'+(e.sp?' sp':'')+'"></div><div><div class="ev-title">'+(e.summary||'(No title)')+'</div><div class="ev-time">'+(e.start?.dateTime?fmtT(e.start.dateTime):'All day')+'</div>'+(showDate?'<div class="ev-time">'+fmtD(e.start?.dateTime||e.start?.date)+'</div>':'')+(e.sp?'<div class="ev-owner">Dorothy\'s calendar</div>':'')+'</div></div>').join('');
}
async function calToday(){
  if(!needAuth())return;busy("Today's Calendar");
  const now=new Date(),s=new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString(),e=new Date(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59).toISOString();
  try{const[m,sp]=await Promise.all([fetchCal('primary',s,e),fetchCal(SPOUSE_CAL,s,e)]);showOut("Today's Calendar",renderCal(m,sp,false));}
  catch(e){showOut("Today's Calendar",'<p class="err">Error: '+e.message+'</p>');}
}
async function calWeek(){
  if(!needAuth())return;busy("This Week");
  const now=new Date(),s=new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString(),e=new Date(now.getFullYear(),now.getMonth(),now.getDate()+7,23,59,59).toISOString();
  try{const[m,sp]=await Promise.all([fetchCal('primary',s,e),fetchCal(SPOUSE_CAL,s,e)]);showOut("This Week's Calendar",renderCal(m,sp,true));}
  catch(e){showOut("This Week",'<p class="err">Error: '+e.message+'</p>');}
}

function parseMeta(msg){
  const h=msg.payload?.headers||[];
  const from=h.find(x=>x.name==='From')?.value||'Unknown';
  const subject=h.find(x=>x.name==='Subject')?.value||'(No subject)';
  const date=h.find(x=>x.name==='Date')?.value||'';
  const replyTo=h.find(x=>x.name==='Reply-To')?.value||from;
  const fromName=from.replace(/<.*>/,'').trim()||from;
  const replyEmail=(replyTo.match(/<(.+)>/)||[])[1]||replyTo;
  const ds=date?new Date(date).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';
  return{id:msg.id,from:fromName,replyEmail,subject,date:ds};
}
async function fetchBody(id){
  const r=await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/'+id+'?format=full',{headers:{Authorization:'Bearer '+tok}});
  const data=await r.json();
  function dec(d){return decodeURIComponent(escape(atob(d.replace(/-/g,'+').replace(/_/g,'/'))));}
  function ext(p,mt){if(!p)return null;if(p.mimeType===mt&&p.body?.data)return dec(p.body.data);if(p.parts){for(const q of p.parts){const r=ext(q,mt);if(r)return r;}}return null;}
  const plain=ext(data.payload,'text/plain');if(plain)return{type:'text',content:plain};
  const html=ext(data.payload,'text/html');if(html)return{type:'html',content:html};
  return{type:'text',content:'(No readable content)'};
}
async function toggleBody(id,btn){
  const el=document.getElementById('body-'+id);
  if(el.classList.contains('show')){el.classList.remove('show');btn.textContent='📖 Read';return;}
  btn.textContent='Loading...';
  try{
    const res=await fetchBody(id);
    if(res.type==='html'){
      el.innerHTML='';const fr=document.createElement('iframe');
      fr.style.cssText='width:100%;border:none;min-height:300px;background:white;border-radius:4px';
      fr.sandbox='allow-same-origin';el.appendChild(fr);el.classList.add('show');
      fr.contentDocument.open();fr.contentDocument.write(res.content);fr.contentDocument.close();
      setTimeout(()=>{fr.style.height=fr.contentDocument.body.scrollHeight+'px';},300);
    }else{el.textContent=res.content;el.classList.add('show');}
    btn.textContent='📖 Hide';
  }catch(e){el.textContent='Error loading.';el.classList.add('show');btn.textContent='📖 Hide';}
}
function toggleReply(id){const el=document.getElementById('reply-'+id);if(el.classList.contains('show')){el.classList.remove('show');return;}el.classList.add('show');el.querySelector('textarea').focus();}
async function sendReply(id,to,subj,btn){
  const ta=document.getElementById('reply-'+id).querySelector('textarea'),body=ta.value.trim();
  const st=document.getElementById('rs-'+id);
  if(!body){st.innerHTML='<span class="err">Please type a reply.</span>';return;}
  btn.textContent='Sending...';
  try{
    const s=(subj.startsWith('Re:')?subj:'Re: '+subj);
    const raw=[`To: ${to}`,`Subject: ${s}`,'Content-Type: text/plain; charset=utf-8','MIME-Version: 1.0','',body].join('\n');
    const enc=btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const r=await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/send',{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({raw:enc})});
    if(r.ok){st.innerHTML='<span class="ok">✓ Sent!</span>';ta.value='';setTimeout(()=>{document.getElementById('reply-'+id).classList.remove('show');st.innerHTML='';},2000);}
    else{const err=await r.json();st.innerHTML='<span class="err">Error: '+err.error?.message+'</span>';}
  }catch(e){st.innerHTML='<span class="err">Error: '+e.message+'</span>';}
  btn.textContent='Send';
}
async function delEmail(id,btn){
  if(!confirm('Delete this email?'))return;btn.textContent='Deleting...';
  try{await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/'+id+'/trash',{method:'POST',headers:{Authorization:'Bearer '+tok}});btn.closest('.em-item').style.opacity='.3';btn.textContent='Deleted';}
  catch(e){btn.textContent='Error';}
}
function emailCard(e){
  return '<div class="em-item"><div class="em-from">'+e.from+'</div><div class="em-subj">'+e.subject+'</div><div class="em-date">'+e.date+'</div>'+
    '<div class="em-actions"><button class="em-btn" onclick="toggleBody(\''+e.id+'\',this)">📖 Read</button><button class="em-btn" onclick="toggleReply(\''+e.id+'\')">↩️ Reply</button><button class="em-btn" onclick="delEmail(\''+e.id+'\',this)">🗑️ Delete</button></div>'+
    '<div class="em-body" id="body-'+e.id+'"></div>'+
    '<div class="reply-form" id="reply-'+e.id+'"><div style="font-size:.78rem;color:var(--text-muted);margin-bottom:8px">To: '+e.replyEmail+'</div><textarea placeholder="Type your reply..."></textarea><button class="send-btn" onclick="sendReply(\''+e.id+'\',\''+e.replyEmail+'\',`'+e.subject.replace(/`/g,"'")+`\`,this)">Send</button><div id="rs-`+e.id+'" style="margin-top:6px;font-size:.78rem"></div></div></div>';
}
async function updateEmailBadge(){
  const b=document.getElementById('em-badge');
  if(!b)return;
  if(!tok){b.style.display='none';return;}
  try{
    const r=await fetch('https://www.googleapis.com/gmail/v1/users/me/labels/INBOX',{headers:{Authorization:'Bearer '+tok}});
    if(!r.ok)return;
    const n=(await r.json()).messagesUnread||0;
    if(n>0){b.textContent=n>99?'99+':n;b.style.display='inline-flex';}
    else{b.style.display='none';}
  }catch(e){}
}
setInterval(updateEmailBadge,5*60*1000);
async function checkEmail(){
  if(!needAuth())return;
  busy('Check Emails','Fetching unread emails...');
  try{
    const ago=Math.floor((Date.now()-30*24*60*60*1000)/1000);
    const r=await fetch('https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=15&labelIds=INBOX&labelIds=UNREAD&q=after:'+ago,{headers:{Authorization:'Bearer '+tok}});
    const d=await r.json();if(!d.messages){showOut('Emails','<p class="no-ev">No unread emails!</p>');return;}
    const msgs=await Promise.all(d.messages.map(m=>fetch('https://www.googleapis.com/gmail/v1/users/me/messages/'+m.id+'?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date&metadataHeaders=Reply-To',{headers:{Authorization:'Bearer '+tok}}).then(r=>r.json())));
    const parsed=msgs.map(parseMeta);
    showOut('Check Emails — '+parsed.length+' Unread',parsed.map(emailCard).join(''));
    updateEmailBadge();
  }catch(e){showOut('Emails','<p class="err">Error: '+e.message+'</p>');}
}
function composeEmail(){
  showOut('Create Email',
    '<div class="fg"><label>To</label><input type="email" id="em-to" placeholder="recipient@example.com"></div>'+
    '<div class="fg"><label>Subject</label><input type="text" id="em-subj" placeholder="Subject"></div>'+
    '<div class="fg"><label>Message</label><textarea id="em-msg" rows="6" placeholder="Type your message..."></textarea></div>'+
    '<button class="sub-btn" onclick="sendNewEmail()">Send Email ✉️</button><div id="send-res" style="margin-top:12px"></div>');
}
async function sendNewEmail(){
  if(!needAuth())return;
  const to=document.getElementById('em-to').value.trim(),subj=document.getElementById('em-subj').value.trim(),body=document.getElementById('em-msg').value.trim();
  const res=document.getElementById('send-res');
  if(!to||!subj||!body){res.innerHTML='<p class="err">Fill in all fields.</p>';return;}
  if(!confirm('Send to '+to+'?'))return;
  res.innerHTML='<div class="loading"><div class="spinner"></div>Sending...</div>';
  try{
    const raw=[`To: ${to}`,`Subject: ${subj}`,'Content-Type: text/plain; charset=utf-8','MIME-Version: 1.0','',body].join('\n');
    const enc=btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const r=await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/send',{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({raw:enc})});
    if(r.ok){res.innerHTML='<p class="ok">✓ Sent to '+to+'!</p>';document.getElementById('em-to').value='';document.getElementById('em-subj').value='';document.getElementById('em-msg').value='';}
    else{const err=await r.json();res.innerHTML='<p class="err">Error: '+err.error?.message+'</p>';}
  }catch(e){res.innerHTML='<p class="err">Error: '+e.message+'</p>';}
}

function addEventForm(){
  const now=new Date().toISOString().slice(0,16);
  showOut('Add Calendar Event',
    '<div class="fg"><label>Event Title</label><input type="text" id="ev-t" placeholder="e.g. Doctor appointment"></div>'+
    '<div class="fg"><label>Date &amp; Time</label><input type="datetime-local" id="ev-s" value="'+now+'"></div>'+
    '<div class="fg"><label>Duration</label><select id="ev-d"><option value="30">30 min</option><option value="60" selected>1 hour</option><option value="90">1.5 hours</option><option value="120">2 hours</option></select></div>'+
    '<div class="fg"><label>Calendar</label><select id="ev-c"><option value="primary">Mine</option><option value="'+SPOUSE_CAL+'">Dorothy\'s</option></select></div>'+
    '<button class="sub-btn" onclick="addEvent()">Add to Calendar</button><div id="ev-res" style="margin-top:12px"></div>');
}
async function addEvent(){
  if(!needAuth())return;
  const title=document.getElementById('ev-t').value.trim(),start=document.getElementById('ev-s').value;
  const dur=parseInt(document.getElementById('ev-d').value),calId=document.getElementById('ev-c').value;
  const res=document.getElementById('ev-res');
  if(!title||!start){res.innerHTML='<p class="err">Fill in title and date.</p>';return;}
  const sd=new Date(start),ed=new Date(sd.getTime()+dur*60000);
  res.innerHTML='<div class="loading"><div class="spinner"></div>Adding...</div>';
  try{
    const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(calId)+'/events',{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({summary:title,start:{dateTime:sd.toISOString()},end:{dateTime:ed.toISOString()}})});
    if(r.ok)res.innerHTML='<p class="ok">✓ "'+title+'" added!</p>';
    else{const err=await r.json();res.innerHTML='<p class="err">Error: '+err.error?.message+'</p>';}
  }catch(e){res.innerHTML='<p class="err">Error: '+e.message+'</p>';}
}

  document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
